<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>halal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0b141a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            transition: background-color 0.3s, color 0.2s;
            position: relative;
            overflow-x: hidden;
        }

        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .snow-particle {
            position: absolute;
            color: #fff;
            user-select: none;
            pointer-events: none;
            font-size: 0.8em;
            animation: fall linear infinite;
            opacity: 0.4;
            will-change: transform;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        :root {
            --bg-primary: #17212b;
            --bg-secondary: #0b141a;
            --bg-sidebar: #17212b;
            --bg-header: #1e2b36;
            --bg-input: #242f3d;
            --text-primary: #fff;
            --text-secondary: #8e9fad;
            --border-color: #0f1a22;
            --message-own-bg: #d4af37;
            --message-other-bg: #182533;
            --accent-color: #d4af37;
            --glow-color: #d4af37;
            --hover-bg: #2b3b4a;
            --shadow: 0 2px 5px rgba(0,0,0,0.3);
            --glow: 0 0 15px var(--glow-color);
            --glow-hover: 0 0 20px var(--glow-color);
        }

        body.light-theme {
            --bg-primary: #f0f4fa;
            --bg-secondary: #e6ecf5;
            --bg-sidebar: #ffffff;
            --bg-header: #dbe2ed;
            --bg-input: #c9d4e3;
            --text-primary: #000;
            --text-secondary: #4a5a6e;
            --border-color: #b0c4de;
            --message-own-bg: #d4af37;
            --message-other-bg: #ffffff;
            --accent-color: #d4af37;
            --glow-color: #d4af37;
            --hover-bg: #c0cbd8;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        body.grey-theme {
            --bg-primary: #2c2f33;
            --bg-secondary: #23272a;
            --bg-sidebar: #2c2f33;
            --bg-header: #3a3f44;
            --bg-input: #40454a;
            --text-primary: #fff;
            --text-secondary: #99aab5;
            --border-color: #202225;
            --message-own-bg: #5865f2;
            --message-other-bg: #3a3f44;
            --accent-color: #5865f2;
            --glow-color: #5865f2;
            --hover-bg: #40474f;
            --shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        body.own-color-gold { --message-own-bg: #d4af37; }
        body.own-color-blue { --message-own-bg: #2b5278; }
        body.own-color-green { --message-own-bg: #2e7d32; }
        body.own-color-red { --message-own-bg: #e53e3e; }
        body.own-color-purple { --message-own-bg: #9b59b6; }
        body.own-color-orange { --message-own-bg: #f39c12; }

        body.other-color-default { --message-other-bg: #182533; }
        body.other-color-light { --message-other-bg: #2a3a4a; }
        body.other-color-dark { --message-other-bg: #10171e; }
        body.other-color-mid { --message-other-bg: #1e2b36; }

        body.accent-color-gold { --accent-color: #d4af37; }
        body.accent-color-blue { --accent-color: #2b5278; }
        body.accent-color-green { --accent-color: #2e7d32; }
        body.accent-color-red { --accent-color: #e53e3e; }
        body.accent-color-purple { --accent-color: #9b59b6; }
        body.accent-color-orange { --accent-color: #f39c12; }

        body.glow-color-gold { --glow-color: #d4af37; }
        body.glow-color-blue { --glow-color: #2b5278; }
        body.glow-color-green { --glow-color: #2e7d32; }
        body.glow-color-red { --glow-color: #e53e3e; }
        body.glow-color-purple { --glow-color: #9b59b6; }
        body.glow-color-orange { --glow-color: #f39c12; }

        .app {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: var(--bg-primary);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background-color 0.3s;
            margin: 0 auto;
            z-index: 1;
        }

        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            transform: translateX(0);
            z-index: 2;
        }

        .sidebar.hide {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            object-fit: cover;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info:hover .avatar {
            transform: scale(1.1);
            box-shadow: var(--glow);
        }

        .user-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.2s, box-shadow 0.2s;
        }

        .icon-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            box-shadow: var(--glow);
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .search-box {
            padding: 10px 15px;
            background: var(--bg-header);
            transition: background-color 0.3s;
        }

        .search-box input {
            width: 100%;
            background: var(--bg-input);
            border: none;
            border-radius: 22px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: background-color 0.3s, color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            box-shadow: 0 0 0 2px var(--accent-color), var(--glow);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            position: relative;
            z-index: 3;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.1s, transform 0.1s, box-shadow 0.2s;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .chat-item:hover {
            background: var(--hover-bg);
            transform: translateX(5px);
            box-shadow: var(--glow);
        }

        .chat-item.active {
            background: var(--bg-input);
            border-left: 3px solid var(--accent-color);
        }

        .chat-item.pinned {
            background: rgba(255, 215, 0, 0.1);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            object-fit: cover;
        }

        .chat-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-item:hover .chat-avatar {
            transform: scale(1.05);
            box-shadow: var(--glow);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .chat-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .chat-item:hover .chat-actions {
            opacity: 1;
        }

        .chat-action-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 16px;
            transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
        }

        .chat-action-btn:hover {
            background: var(--accent-color);
            transform: scale(1.1);
            box-shadow: var(--glow-hover);
        }

        .pin-indicator {
            color: gold;
            margin-left: 5px;
        }

        .games-btn-container {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-sidebar);
            transition: background-color 0.3s, border-color 0.3s;
            position: relative;
            z-index: 3;
        }

        .games-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s, color 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }

        .games-btn:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: var(--glow-hover);
        }

        .games-btn:active {
            transform: translateY(0);
        }

        .chat-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, background-color 0.3s;
            transform: translateX(100%);
            z-index: 3;
        }

        .chat-panel.show {
            transform: translateX(0);
        }

        .chat-header {
            padding: 10px 20px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.15s, color 0.2s, box-shadow 0.2s;
        }

        .back-button:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            box-shadow: var(--glow);
        }

        .chat-header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            animation: pulse 3s infinite;
            transition: background-color 0.3s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: var(--shadow);
            object-fit: cover;
        }

        .chat-header-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: var(--shadow); }
            50% { transform: scale(1.05); background-color: var(--accent-color); filter: brightness(1.1); box-shadow: var(--glow); }
            100% { transform: scale(1); box-shadow: var(--shadow); }
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
        }

        .chat-header-info h3 {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.2s;
        }

        .chat-header-info span {
            font-size: 13px;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .members-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.2s, box-shadow 0.2s;
        }

        .members-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            box-shadow: var(--glow);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-secondary);
            transition: background-color 0.3s;
            position: relative;
            z-index: 3;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other-bg);
            align-self: flex-start;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .message.own {
            background: var(--message-own-bg);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.new {
            animation: messageGlow 0.6s ease-out;
        }

        @keyframes messageGlow {
            0% {
                opacity: 0;
                transform: scale(0.7);
                background: #ffaa00;
                color: #000;
                box-shadow: 0 0 20px #ffaa00;
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
                background: #ffd966;
                color: #000;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                background: inherit;
                color: inherit;
                box-shadow: none;
            }
        }

        .message .sender-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .message-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 5px;
        }

        .message-image-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
        }

        .message-input-area {
            padding: 15px 20px;
            background: var(--bg-header);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: background-color 0.3s, border-color 0.3s;
            position: relative;
            z-index: 3;
        }

        .attach-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .attach-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .attach-btn:hover {
            background: var(--accent-color);
            transform: scale(1.1);
            box-shadow: var(--glow-hover);
        }

        .message-input-area textarea {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 25px;
            padding: 14px 20px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 120px;
            outline: none;
            transition: background-color 0.3s, color 0.2s, box-shadow 0.2s;
        }

        .message-input-area textarea:focus {
            box-shadow: 0 0 0 2px var(--accent-color), var(--glow);
        }

        .send-btn {
            background: var(--accent-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, background-color 0.3s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        .send-btn.animate {
            animation: sendPop 0.3s ease;
        }

        @keyframes sendPop {
            0% { transform: scale(1); background: #ffaa00; }
            50% { transform: scale(1.3); background: #ffd966; }
            100% { transform: scale(1); background: var(--accent-color); }
        }

        .send-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .send-btn:hover {
            filter: brightness(1.2);
            box-shadow: var(--glow-hover);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.3s;
            color: var(--text-primary);
            transition: background-color 0.3s, border-color 0.3s;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            z-index: 1001;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--accent-color);
            transition: color 0.2s;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 14px 18px;
            color: var(--text-primary);
            margin-bottom: 15px;
            transition: background-color 0.3s, border-color 0.3s, color 0.2s;
        }

        .modal-content input:focus, .modal-content select:focus {
            box-shadow: 0 0 0 2px var(--accent-color), var(--glow);
            outline: none;
        }

        .modal-content button {
            background: var(--accent-color);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.3s, transform 0.1s, box-shadow 0.2s;
        }

        .modal-content button:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-hover);
        }

        .modal-content button.small {
            padding: 8px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .modal-tab {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            padding: 10px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background-color 0.3s, color 0.2s, box-shadow 0.2s;
        }

        .modal-tab.active {
            background: var(--accent-color);
            color: white;
        }

        .modal-tab:hover {
            box-shadow: var(--glow);
        }

        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .error-text {
            color: #ff8a8a;
            background: #2a1f1f;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .success-text {
            color: #8aff8a;
            background: #1f2a1f;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 20;
            display: none;
            flex-direction: column;
        }

        .iframe-container.active {
            display: flex;
        }

        .iframe-header {
            padding: 15px 20px;
            background: var(--bg-header);

    <script>
        let myId = null;
        let myName = null;
        let myEmail = null;
        let myAvatar = null;
        let githubConfig = null;
        let dbCache = [];
        let currentChatId = null;
        let currentChatType = null;
        let currentPeerInfo = '';
        let messagesUpdateInterval = null;
        let dbUpdateInterval = null;
        let chats = [];
        let prevMessagesCount = 0;
        let users = JSON.parse(localStorage.getItem('halal_users')) || [];
        let snowInterval = null;
        let snowEnabled = false;
        let snowColor = '#ffffff';
        let snowIntensity = 8;

        function generatePersonId() { return 'p_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_person'; }
        function generateGroupId() { return 'g_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_group'; }

        async function getDatabaseFromGitHub() {
            if (!githubConfig) return [];
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 404) {
                    await createEmptyDatabaseFile();
                    return [];
                }
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(`GitHub ${res.status}: ${err.message}`);
                }
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const lines = content.trim().split('\n').filter(l => l.trim());
                const items = lines.map(line => {
                    const parts = line.split('|');
                    if (parts.length === 5) {
                        const [name, email, password, avatar, id] = parts;
                        return { rawName: name, name, email, password, avatar, id, type: id.endsWith('_group') ? 'group' : 'person' };
                    } else if (parts.length === 4) {
                        const [name, email, password, id] = parts;
                        return { rawName: name, name, email, password, avatar: '', id, type: id.endsWith('_group') ? 'group' : 'person' };
                    } else if (parts.length === 2) {
                        const [rawName, id] = parts;
                        return { rawName, name: rawName, email: '', password: '', avatar: '', id, type: id.endsWith('_group') ? 'group' : 'person' };
                    } else {
                        return null;
                    }
                }).filter(i => i);
                dbCache = items;
                return items;
            } catch (e) {
                document.getElementById('githubStatus').innerHTML = `<span style="color:#ffaaaa;">❌ ошибка чтения: ${e.message}</span>`;
                return [];
            }
        }

        async function createEmptyDatabaseFile() {
            if (!githubConfig) return;
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify({ 
                    message: 'init database', 
                    content: btoa(unescape(encodeURIComponent(''))) 
                })
            });
        }

        async function appendToDatabase(entryName, id, email = '', password = '', avatar = '') {
            if (!githubConfig) return { success: false, error: 'GitHub не настроен' };
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            let sha = null, currentContent = '';
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentContent = decodeURIComponent(escape(atob(data.content)));
                }
            } catch (e) {}
            let newLine;
            if (id.endsWith('_group')) {
                newLine = `${entryName}|${id}`;
            } else {
                newLine = `${entryName}|${email}|${password}|${avatar}|${id}`;
            }
            const newContent = currentContent + (currentContent.endsWith('\n') || !currentContent ? '' : '\n') + newLine + '\n';
            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ 
                        message: `add ${entryName}`, 
                        content: btoa(unescape(encodeURIComponent(newContent))), 
                        sha: sha || undefined 
                    })
                });
                dbCache.push({ rawName: entryName, name: entryName, email, password, avatar, id, type: id.endsWith('_group') ? 'group' : 'person' });
                return { success: true };
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        async function updateUserInDatabase(id, name, email, password, avatar) {
            if (!githubConfig) return false;
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (!res.ok) return false;
                const data = await res.json();
                const sha = data.sha;
                let content = decodeURIComponent(escape(atob(data.content)));
                const lines = content.split('\n');
                const newLines = lines.map(line => {
                    if (line.includes(id)) {
                        const parts = line.split('|');
                        if (parts.length === 5 && parts[4] === id) {
                            return `${name}|${email}|${password}|${avatar}|${id}`;
                        } else if (parts.length === 4 && parts[3] === id) {
                            return `${name}|${email}|${password}|${avatar}|${id}`;
                        } else if (parts.length === 2 && parts[1] === id) {
                            return `${name}|${email}|${password}|${avatar}|${id}`;
                        }
                    }
                    return line;
                });
                const newContent = newLines.join('\n');
                await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ 
                        message: `update user ${id}`, 
                        content: btoa(unescape(encodeURIComponent(newContent))), 
                        sha: sha 
                    })
                });
                const entry = dbCache.find(e => e.id === id);
                if (entry) {
                    entry.name = name;
                    entry.email = email;
                    entry.password = password;
                    entry.avatar = avatar;
                }
                return true;
            } catch (e) {
                return false;
            }
        }

        async function uploadFileToGitHub(file, fileName) {
            if (!githubConfig) return null;
            const { token, owner, repo } = githubConfig;
            const path = `files/${fileName}`;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            
            const reader = new FileReader();
            return new Promise((resolve) => {
                reader.onload = async function(e) {
                    const content = e.target.result.split(',')[1];
                    try {
                        const res = await fetch(url, {
                            method: 'PUT',
                            headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                            body: JSON.stringify({ 
                                message: `upload file ${fileName}`, 
                                content: content
                            })
                        });
                        if (res.ok) {
                            const downloadUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}`;
                            resolve(downloadUrl);
                        } else {
                            resolve(null);
                        }
                    } catch {
                        resolve(null);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        async function getGroupMessages(groupId) {
            if (!githubConfig) return [];
            const { token, owner, repo } = githubConfig;
            const path = `group_${groupId}.txt`;

        function renderChatsList() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            if (chats.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align:center; padding:20px;">Нет чатов</div>';
                return;
            }
            const sorted = [...chats].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return 0;
            });
            sorted.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''} ${chat.pinned ? 'pinned' : ''}`;
                div.dataset.id = chat.id;
                div.dataset.type = chat.type;
                div.dataset.name = chat.name;
                
                let avatarContent = '';
                const entry = dbCache.find(e => e.id === chat.id);
                if (entry && entry.avatar) {
                    avatarContent = `<img src="${entry.avatar}" class="chat-avatar-img">`;
                } else {
                    avatarContent = chat.type === 'group' ? '👥' : '👤';
                }
                
                div.innerHTML = `
                    <div class="chat-avatar">${avatarContent}</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${chat.name}
                            ${chat.pinned ? '<span class="pin-indicator">📌</span>' : ''}
                        </div>
                        <div class="chat-preview">${chat.lastMessage || '...'}</div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn pin-btn" title="${chat.pinned ? 'Открепить' : 'Закрепить'}">${chat.pinned ? '📍' : '📌'}</button>
                        <button class="chat-action-btn delete-btn" title="Удалить чат">🗑️</button>
                    </div>
                `;
                div.querySelector('.pin-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePinChat(chat.id);
                });
                div.querySelector('.delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                });
                div.addEventListener('click', () => {
                    enterChat(chat.id, chat.type, chat.name);
                });
                container.appendChild(div);
            });
        }

        function animateNewMessages() {
            const container = document.getElementById('messagesContainer');
            const messages = container.children;
            const newCount = messages.length;
            const diff = newCount - prevMessagesCount;
            if (diff > 0) {
                for (let i = newCount - diff; i < newCount; i++) {
                    messages[i].classList.add('new');
                    setTimeout(() => {
                        messages[i].classList.remove('new');
                    }, 600);
                }
            }
            prevMessagesCount = newCount;
        }

        async function enterChat(chatId, type, peerInfo) {
            document.getElementById('gamesContainer').classList.remove('active');
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageArea').style.display = 'flex';
            document.getElementById('messagesContainer').style.display = 'flex';

            currentChatId = chatId;
            currentChatType = type;
            currentPeerInfo = peerInfo;

            document.getElementById('chatTitle').innerText = peerInfo;
            document.getElementById('chatStatus').innerText = type === 'group' ? '👥 группа' : '👤 личный чат';
            
            const chatAvatar = document.getElementById('chatAvatar');
            const chatAvatarImg = document.getElementById('chatAvatarImg');
            const entry = dbCache.find(e => e.id === chatId);
            if (entry && entry.avatar) {
                chatAvatarImg.src = entry.avatar;
                chatAvatarImg.style.display = 'block';
                chatAvatar.querySelector('span').style.display = 'none';
            } else {
                chatAvatarImg.style.display = 'none';
                chatAvatar.querySelector('span').style.display = 'block';
                chatAvatar.querySelector('span').innerText = type === 'group' ? '👥' : '👤';
            }

            if (type === 'group') {
                document.getElementById('membersBtn').style.display = 'flex';
            } else {
                document.getElementById('membersBtn').style.display = 'none';
            }

            renderChatsList();

            document.getElementById('messagesContainer').innerHTML = '';
            prevMessagesCount = 0;
            if (messagesUpdateInterval) clearInterval(messagesUpdateInterval);
            await loadMessages();
            messagesUpdateInterval = setInterval(loadMessages, 3000);

            showChat();
        }

        async function loadMessages() {
            if (!currentChatId) return;
            let msgs = [];
            if (currentChatType === 'group') {
                msgs = await getGroupMessages(currentChatId);
            } else {
                msgs = await getPrivateMessages(currentChatId);
            }
            const container = document.getElementById('messagesContainer');
            msgs.forEach(m => {
                const isOwn = m.senderId === myId;
                if (!isOwn && currentChatType === 'private') {
                    const entry = dbCache.find(e => e.id === m.senderId);
                    if (entry) {
                        ensureChatExists(m.senderId, entry.name, 'private');
                    } else {
                        ensureChatExists(m.senderId, m.senderName || 'Неизвестно', 'private');
                    }
                }
            });
            container.innerHTML = '';
            msgs.forEach(m => {
                const isOwn = m.senderId === myId;
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                if (isOwn) msgDiv.classList.add('own');
                
                const senderEntry = dbCache.find(e => e.id === m.senderId);
                const senderName = senderEntry ? senderEntry.name : (m.senderName || 'Неизвестно');
                
                if (currentChatType === 'group' && !isOwn) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'sender-name';
                    nameSpan.innerText = senderName;
                    msgDiv.appendChild(nameSpan);
                }
                
                if (m.image) {
                    const img = document.createElement('img');
                    img.src = m.image;
                    img.className = 'message-image';
                    img.addEventListener('click', () => {
                        document.getElementById('fullImage').src = m.image;
                        document.getElementById('imageModal').classList.add('active');
                    });
                    msgDiv.appendChild(img);
                }
                
                if (m.text) {
                    const textNode = document.createTextNode(m.text);
                    msgDiv.appendChild(textNode);
                }
                
                container.appendChild(msgDiv);
            });
            animateNewMessages();
            container.scrollTop = container.scrollHeight;
        }

        async function addChatFromSearch(searchId) {
            const entry = dbCache.find(e => e.id === searchId);
            if (!entry) return null;

            let chatName = entry.name;
            let type = entry.type === 'group' ? 'group' : 'private';

            ensureChatExists(entry.id, chatName, type);
            return { id: entry.id, name: chatName, type };
        }

        function startSnow(intensity, color) {
            if (snowInterval) clearInterval(snowInterval);
            if (intensity <= 0) return;
            
            const container = document.getElementById('snow-container');
            container.innerHTML = '';
            
            snowInterval = setInterval(() => {
                if (document.hidden) return;
                for (let i = 0; i < intensity; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = 'snow-particle';
                    snowflake.innerText = '●';
                    snowflake.style.left = Math.random() * 100 + '%';
                    snowflake.style.animationDuration = Math.random() * 8 + 8 + 's';
                    snowflake.style.fontSize = Math.random() * 8 + 4 + 'px';
                    snowflake.style.opacity = Math.random() * 0.3 + 0.2;
                    snowflake.style.color = color;
                    container.appendChild(snowflake);
                    
                    setTimeout(() => {
                        snowflake.remove();
                    }, 16000);
                }
            }, 400);
        }

        function updateSnowEffect() {
            if (snowInterval) {
                clearInterval(snowInterval);
                snowInterval = null;
            }
            if (snowIntensity > 0) {
                startSnow(snowIntensity, snowColor);
            }
        }

                const accentColor = document.getElementById('accentColorSelect').value;
                const glowColor = document.getElementById('glowColorSelect').value;
                localStorage.setItem('halal_theme', theme);
                localStorage.setItem('halal_own_color', ownColor);
                localStorage.setItem('halal_other_color', otherColor);
                localStorage.setItem('halal_accent_color', accentColor);
                localStorage.setItem('halal_glow_color', glowColor);
                applyCustomization(theme, ownColor, otherColor, accentColor, glowColor);
                
                const intensity = parseInt(document.getElementById('snowIntensity').value);
                const color = document.getElementById('snowColor').value;
                localStorage.setItem('halal_snow_intensity', intensity);
                localStorage.setItem('halal_snow_color', color);
                snowIntensity = intensity;
                snowColor = color;
                updateSnowEffect();
                
                modalCustomize.classList.remove('active');
            };

            document.getElementById('snowIntensity').addEventListener('input', function() {
                document.getElementById('snowIntensityValue').innerText = this.value;
            });

            document.getElementById('membersBtn').onclick = async function () {
                if (!currentChatId || currentChatType !== 'group') return;
                const members = await getGroupMembers(currentChatId);
                const list = document.getElementById('membersList');
                list.innerHTML = '';
                for (const memberId of members) {
                    const entry = dbCache.find(e => e.id === memberId) || { name: 'Неизвестно', avatar: null };
                    let avatarHtml = '';
                    if (entry.avatar) {
                        avatarHtml = `<img src="${entry.avatar}" class="avatar-small-img">`;
                    } else {
                        avatarHtml = entry.name.charAt(0).toUpperCase();
                    }
                    const li = document.createElement('li');
                    li.innerHTML = `<div class="avatar-small">${avatarHtml}</div> ${entry.name} (${memberId})`;
                    list.appendChild(li);
                }
                document.getElementById('membersModalTitle').innerText = `Участники группы ${currentPeerInfo}`;
                modalMembers.classList.add('active');
            };

            document.getElementById('closeMembersBtn').onclick = () => {
                modalMembers.classList.remove('active');
            };

            document.getElementById('closeImageBtn').onclick = () => {
                modalImage.classList.remove('active');
            };

            document.getElementById('attachBtn').onclick = () => {
                document.getElementById('fileInput').click();
            };

            document.getElementById('fileInput').onchange = async function(e) {
                const file = e.target.files[0];
                if (!file || !currentChatId) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('Файл слишком большой (макс 5MB)');
                    return;
                }
                
                const fileName = `image_${Date.now()}_${file.name}`;
                const url = await uploadFileToGitHub(file, fileName);
                if (url) {
                    const senderName = myName || myId;
                    const msgObj = { 
                        image: url,
                        senderId: myId,
                        senderName: senderName,
                        time: Date.now() 
                    };
                    if (currentChatType === 'group') {
                        await appendToGroupMessages(currentChatId, msgObj);
                    } else {
                        await appendToPrivateMessages(currentChatId, msgObj);
                    }
                    await loadMessages();
                }
            };

            if (!hasConfig) {
                modalGithub.classList.add('active');
            } else {
                if (!loadOwnProfile()) {
                    modalRegister.classList.add('active');
                } else {
                    modalGithub.classList.remove('active');
                    modalRegister.classList.remove('active');
                    updateSidebarUserInfo();
                    loadChatsFromStorage();
                    await getDatabaseFromGitHub();
                    dbUpdateInterval = setInterval(async () => {
                        await getDatabaseFromGitHub();
                    }, 3000);
                }
            }

            document.getElementById('globalGithubBtn').onclick = () => {
                modalGithub.classList.add('active');
            };
            document.getElementById('closeModalBtn').onclick = () => {
                modalGithub.classList.remove('active');
            };
            document.getElementById('saveGitHubBtn').onclick = async function () {
                if (saveGitHubConfig()) {
                    modalGithub.classList.remove('active');
                    if (!loadOwnProfile()) {
                        modalRegister.classList.add('active');
                    } else {
                        await getDatabaseFromGitHub();
                        if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                        dbUpdateInterval = setInterval(async () => {
                            await getDatabaseFromGitHub();
                        }, 3000);
                    }
                }
            };

            document.getElementById('tabRegister').onclick = () => {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('registerBlock').style.display = 'block';
                document.getElementById('loginBlock').style.display = 'none';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
            };
            document.getElementById('tabLogin').onclick = () => {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
                document.getElementById('registerBlock').style.display = 'none';
                document.getElementById('loginBlock').style.display = 'block';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
            };

            document.getElementById('registerBtn').onclick = async function () {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                if (!name || !email || !password) {
                    document.getElementById('authError').innerText = '❌ Заполните все поля';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                const existing = users.find(u => u.email === email) || dbCache.find(u => u.email === email);
                if (existing) {
                    document.getElementById('authError').innerText = '❌ Пользователь с таким email уже существует';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                const newId = generatePersonId();
                users.push({ name, email, password, id: newId });
                localStorage.setItem('halal_users', JSON.stringify(users));
                myId = newId;
                myName = name;
                myEmail = email;
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name, email }));
                modalRegister.classList.remove('active');
                updateSidebarUserInfo();
                loadChatsFromStorage();
                await getDatabaseFromGitHub();
                await appendToDatabase(name, newId, email, password, '');
                if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                dbUpdateInterval = setInterval(async () => {
                    await getDatabaseFromGitHub();
                }, 3000);
            };

            document.getElementById('loginBtn').onclick = async function () {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                let user = users.find(u => u.email === email && u.password === password);
                if (!user) {
                    const dbUser = dbCache.find(u => u.email === email && u.password === password);
                    if (dbUser) {
                        user = { name: dbUser.name, email: dbUser.email, password: dbUser.password, id: dbUser.id, avatar: dbUser.avatar };
                        if (!users.find(u => u.id === dbUser.id)) {
                            users.push(user);
                            localStorage.setItem('halal_users', JSON.stringify(users));
                        }
                    }
                }
                if (!user) {
                    document.getElementById('authError').innerText = '❌ Неверный email или пароль';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                myId = user.id;
                myName = user.name;
                myEmail = user.email;
                myAvatar = user.avatar || null;
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: myName, email: myEmail, avatar: myAvatar }));
                modalRegister.classList.remove('active');
                updateSidebarUserInfo();
                loadChatsFromStorage();
                await getDatabaseFromGitHub();
                if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                dbUpdateInterval = setInterval(async () => {
                    await getDatabaseFromGitHub();
                }, 3000);
            };

            document.getElementById('searchIdInput').addEventListener('keypress', async function (e) {
                if (e.key === 'Enter') {
                    const searchId = this.value.trim();
                    if (!searchId) return;
                    const chatInfo = await addChatFromSearch(searchId);
                    if (chatInfo) {
                        enterChat(chatInfo.id, chatInfo.type, chatInfo.name);
                    } else {
                        alert('ID не найден');
                    }
                    this.value = '';
                }
            });

            document.getElementById('sendMsgBtn').onclick = async function () {
                const msg = document.getElementById('messageInput').value.trim();
                if (!msg || !currentChatId) {
                    alert('Нет активного чата');
                    return;
                }
                const senderName = myName || myId;
                const msgObj = { 
                    text: msg, 
                    senderId: myId,
                    senderName: senderName,
                    time: Date.now() 
                };
                if (currentChatType === 'group') {
                    await appendToGroupMessages(currentChatId, msgObj);
                } else {
                    await appendToPrivateMessages(currentChatId, msgObj);
                }
                document.getElementById('messageInput').value = '';
                const sendBtn = document.getElementById('sendMsgBtn');
                sendBtn.classList.add('animate');
                setTimeout(() => sendBtn.classList.remove('animate'), 300);
                await loadMessages();
            };

            document.getElementById('messageInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    document.getElementById('sendMsgBtn').click(); 
                }
            });

            document.getElementById('gamesButton').onclick = () => {
                document.getElementById('gamesContainer').classList.add('active');
                document.getElementById('chatHeader').style.display = 'none';
                document.getElementById('messageArea').style.display = 'none';
                document.getElementById('messagesContainer').style.display = 'none';
            };
            document.getElementById('backFromGamesBtn').onclick = () => {
                document.getElementById('gamesContainer').classList.remove('active');
                if (currentChatId) {
                    document.getElementById('chatHeader').style.display = 'flex';
                    document.getElementById('messageArea').style.display = 'flex';
                    document.getElementById('messagesContainer').style.display = 'flex';
                } else {
                    document.getElementById('chatHeader').style.display = 'none';
                    document.getElementById('messageArea').style.display = 'none';
                    document.getElementById('messagesContainer').innerHTML = '<div style="color: var(--text-secondary); text-align:center; padding:40px;">👋 Начните общение</div>';
                }
            };

            document.getElementById('backToChatsBtn').onclick = () => {
                showSidebar();
            };
        };
    </script>
</body>
</html>
