<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>halal messange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0a0c0e;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .app {
            max-width: 750px;
            width: 100%;
            background: #0f1215;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            padding: 20px;
            border: 1px solid #1e2a36;
            position: relative;
        }
        h1 {
            font-size: 1.9rem;
            color: #c8dfff;
            border-left: 5px solid #0d47a1;
            padding-left: 15px;
            margin-bottom: 18px;
            font-weight: 500;
        }
        .card {
            background: #141a20;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 22px;
            border: 1px solid #263238;
        }
        .btn {
            background: #0d2c4e;
            border: none;
            border-radius: 40px;
            padding: 12px 22px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            border-bottom: 2px solid #051e34;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }
        .btn-small {
            width: auto;
            padding: 8px 18px;
        }
        .btn:hover {
            background: #0d47a1;
            border-bottom-color: #0a356b;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-icon:hover {
            transform: scale(1.05);
            background: #f0f6fc;
        }
        .btn-icon svg {
            width: 24px;
            height: 24px;
        }
        input, textarea {
            background: #1e262c;
            border: 1px solid #2e3b45;
            border-radius: 30px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 14px;
        }
        input:focus, textarea:focus {
            border-color: #1e88e5;
            outline: none;
            background: #1a2127;
        }
        .flex {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .own-id-box {
            background: #0b1b2a;
            padding: 14px 20px;
            border-radius: 40px;
            border: 1px solid #0d47a1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all;
        }
        .messages {
            background: #0c1116;
            border-radius: 24px;
            padding: 18px;
            height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0;
            border: 1px solid #1f3a4b;
        }
        .message {
            max-width: 80%;
            padding: 11px 17px;
            border-radius: 20px;
            background: #1e2a36;
            align-self: flex-start;
            color: #f0f6fc;
            border-bottom-left-radius: 6px;
            word-wrap: break-word;
        }
        .message.own {
            background: #0a3a5c;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 20px;
        }
        .badge {
            background: #0f2a40;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b0d4ff;
        }
        .small-note {
            color: #8899aa;
            font-size: 0.8rem;
            margin-top: 6px;
        }
        .error-text {
            color: #ffaaaa;
            font-size: 0.85rem;
            margin-top: 8px;
            background: #2a1a1a;
            padding: 8px 12px;
            border-radius: 12px;
            border-left: 4px solid #ff5555;
        }
        .github-corner {
            position: absolute;
            top: 12px;
            right: 20px;
        }
        .search-info {
            background: #1a232c;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 8px;
            border: 1px solid #2e4055;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @media (max-width: 500px) {
            .app { padding: 16px; }
            h1 { font-size: 1.6rem; }
            .github-corner { top: 8px; right: 16px; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <h1> halal messange</h1>

    <div class="github-corner">
        <button class="btn-icon" id="globalGithubBtn" title="Настройки GitHub">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="#0d2c4e" d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.26-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.38.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.58.68.5C19.14 20.16 22 16.42 22 12c0-5.52-4.48-10-10-10z"/>
            </svg>
        </button>
    </div>

    <div class="card" id="githubSetupCard" style="display: none;">
        <div style="margin-bottom: 14px; color:#9ac7ff;">🔧 доступ к базе GitHub</div>
        <input type="text" id="githubToken" placeholder="вставь GitHub классический токен (repo)" value="">
        <div class="flex">
            <input type="text" id="githubOwner" placeholder="владелец" value="blashenny363-ux" style="flex:1;">
            <input type="text" id="githubRepo" placeholder="репозиторий" value="halal" style="flex:1;">
        </div>
        <input type="text" id="githubPath" placeholder="путь к database.txt" value="database.txt">
        <button class="btn" id="saveGitHubBtn">💾 сохранить</button>
        <div id="githubStatus" class="small-note"></div>
        <div style="margin-top: 12px; text-align: right;">
            <button class="btn-small" id="closeSetupBtn" style="background: #1e2a36;">✖ закрыть</button>
        </div>
    </div>

    <div class="card" id="registerCard" style="display: block;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-small" id="showUserRegBtn" style="background: #0d2c4e;">👤 регистрация</button>
            <button class="btn btn-small" id="showChannelRegBtn" style="background: #0a2a3a;">📢 создать канал</button>
        </div>
        <div id="userRegBlock">
            <input type="text" id="firstName" placeholder="имя">
            <input type="text" id="lastName" placeholder="фамилия">
            <button class="btn" id="registerBtn">✅ получить ID</button>
        </div>
        <div id="channelRegBlock" style="display: none;">
            <input type="text" id="channelName" placeholder="название канала">
            <button class="btn" id="createChannelBtn">📢 создать канал</button>
        </div>
        <div id="registrationError" class="error-text" style="display: none;"></div>
    </div>

    <div id="mainInterface" style="display: none;">
        <div class="own-id-box" id="ownIdBox">
            <span id="myIdDisplay" style="font-weight:600; color:#b3e0ff;"></span>
            <div style="display: flex; gap: 6px;">
                <button class="btn btn-small" id="copyIdBtn">📋 копировать</button>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <div style="margin-bottom: 14px;">🔎 найти по ID</div>
            <div class="flex">
                <input type="text" id="searchIdInput" placeholder="введи ID" style="flex:3; margin-bottom:0;">
                <button class="btn btn-small" id="searchBtn" style="flex:1;">найти</button>
            </div>
            <div id="searchResult" style="margin-top: 16px; min-height: 60px;"></div>
        </div>

        <div style="margin-top: 8px;">
            <div class="flex" style="justify-content: space-between;">
                <h3 id="chatWithLabel" style="color:#8fcbff;">💬 нет чата</h3>
                <span id="connectionStatus" class="badge"></span>
            </div>
            <div id="messagesContainer" class="messages">
                <div style="color: #8899aa; text-align: center; padding: 20px;">👋 введи ID и нажми найти</div>
            </div>
            <div class="flex">
                <textarea id="messageInput" placeholder="сообщение..." rows="1" style="resize: none; flex:4; margin-bottom:0; border-radius: 30px;"></textarea>
                <button class="btn btn-small" id="sendMsgBtn" style="flex:1;">🚀 отправить</button>
            </div>
        </div>
    </div>
</div>

<script>
    let myId = null;
    let myName = null;
    let mySurname = null;
    let myIsChannel = false;
    let githubConfig = null;
    let dbCache = [];
    let currentChatId = null;
    let currentChatType = null;
    let messagesUpdateInterval = null;

    async function getDatabaseFromGitHub() {
        if (!githubConfig) return [];
        const { token, owner, repo, path } = githubConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (res.status === 404) {
                await createEmptyDatabaseFile();
                return [];
            }
            if (!res.ok) {
                const err = await res.json();
                throw new Error(`GitHub ${res.status}: ${err.message}`);
            }
            const data = await res.json();
            const content = atob(data.content);
            const lines = content.trim().split('\n').filter(l => l.trim());
            const items = lines.map(line => {
                const [rawName, id] = line.split(' ');
                return { rawName, id, name: rawName, surname: '' };
            }).filter(i => i.id);
            dbCache = items;
            return items;
        } catch (e) {
            document.getElementById('githubStatus').innerHTML = `<span style="color:#ffaaaa;">❌ ошибка чтения: ${e.message}</span>`;
            return [];
        }
    }

    async function createEmptyDatabaseFile() {
        if (!githubConfig) return;
        const { token, owner, repo, path } = githubConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        await fetch(url, {
            method: 'PUT',
            headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: 'init database', content: btoa('') })
        });
    }

    async function appendToDatabase(entryName, id) {
        if (!githubConfig) return { success: false, error: 'GitHub не настроен' };
        const { token, owner, repo, path } = githubConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        let sha = null, currentContent = '';
        try {
            const res = await fetch(url, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
                currentContent = atob(data.content);
            }
        } catch (e) {}
        const newLine = `${entryName} ${id}`;
        const newContent = currentContent + (currentContent.endsWith('\n') || !currentContent ? '' : '\n') + newLine + '\n';
        try {
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify({ message: `add ${entryName}`, content: btoa(newContent), sha: sha || undefined })
            });
            dbCache.push({ rawName: entryName, id, name: entryName, surname: '' });
            return { success: true };
        } catch (e) {
            return { success: false, error: e.message };
        }
    }

    async function getChannelMessages(channelId) {
        if (!githubConfig) return [];
        const { token, owner, repo } = githubConfig;
        const path = `channel_${channelId}.txt`;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (res.status === 404) return [];
            const data = await res.json();
            const content = atob(data.content);
            return content.trim().split('\n').filter(l => l).map(line => {
                try { return JSON.parse(line); } catch { return null; }
            }).filter(m => m);
        } catch { return []; }
    }

    async function appendToChannelMessages(channelId, msgObj) {
        if (!githubConfig) return;
        const { token, owner, repo } = githubConfig;
        const path = `channel_${channelId}.txt`;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        let sha = null, currentContent = '';
        try {
            const res = await fetch(url, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
                currentContent = atob(data.content);
            }
        } catch (e) {}
        const newLine = JSON.stringify(msgObj);
        const newContent = currentContent + (currentContent ? '\n' : '') + newLine;
        await fetch(url, {
            method: 'PUT',
            headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: `message in ${channelId}`, content: btoa(newContent), sha: sha || undefined })
        });
    }

    async function getPrivateMessages(peerId) {
        if (!githubConfig || !myId) return [];
        const ids = [myId, peerId].sort();
        const chatId = `private_${ids[0]}_${ids[1]}`;
        const { token, owner, repo } = githubConfig;
        const path = `${chatId}.txt`;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (res.status === 404) return [];
            const data = await res.json();
            const content = atob(data.content);
            return content.trim().split('\n').filter(l => l).map(line => {
                try { return JSON.parse(line); } catch { return null; }
            }).filter(m => m);
        } catch { return []; }
    }

    async function appendToPrivateMessages(peerId, msgObj) {
        if (!githubConfig || !myId) return;
        const ids = [myId, peerId].sort();
        const chatId = `private_${ids[0]}_${ids[1]}`;
        const { token, owner, repo } = githubConfig;
        const path = `${chatId}.txt`;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        let sha = null, currentContent = '';
        try {
            const res = await fetch(url, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
                currentContent = atob(data.content);
            }
        } catch (e) {}
        const newLine = JSON.stringify(msgObj);
        const newContent = currentContent + (currentContent ? '\n' : '') + newLine;
        await fetch(url, {
            method: 'PUT',
            headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: `private message`, content: btoa(newContent), sha: sha || undefined })
        });
    }

    function generatePersonId() { return 'p_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_person'; }
    function generateChannelId() { return 'c_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_channel'; }

    function loadGitHubConfig() {
        const stored = localStorage.getItem('halal_github_config');
        if (stored) {
            githubConfig = JSON.parse(stored);
            document.getElementById('githubToken').value = githubConfig.token || '';
            document.getElementById('githubOwner').value = githubConfig.owner || '';
            document.getElementById('githubRepo').value = githubConfig.repo || '';
            document.getElementById('githubPath').value = githubConfig.path || 'database.txt';
            return true;
        }
        return false;
    }

    function saveGitHubConfig() {
        const token = document.getElementById('githubToken').value.trim();
        const owner = document.getElementById('githubOwner').value.trim();
        const repo = document.getElementById('githubRepo').value.trim();
        let path = document.getElementById('githubPath').value.trim() || 'database.txt';
        if (!token || !owner || !repo) { 
            document.getElementById('githubStatus').innerHTML = '<span style="color:#ffaaaa;">❌ заполни все поля</span>';
            return false; 
        }
        githubConfig = { token, owner, repo, path };
        localStorage.setItem('halal_github_config', JSON.stringify(githubConfig));
        document.getElementById('githubStatus').innerHTML = '<span style="color:#aaffaa;">✅ настройки сохранены</span>';
        return true;
    }

    function loadOwnProfile() {
        const stored = localStorage.getItem('halal_my_profile');
        if (stored) {
            const p = JSON.parse(stored);
            myId = p.id;
            myName = p.name;
            mySurname = p.surname;
            myIsChannel = p.isChannel || false;
            return true;
        }
        return false;
    }

    function addMessageToChat(text, isOwn = true) {
        const container = document.getElementById('messagesContainer');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        if (isOwn) msgDiv.classList.add('own');
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function clearMessages() { document.getElementById('messagesContainer').innerHTML = ''; }

    async function enterChat(chatId, type, peerInfo) {
        clearMessages();
        currentChatId = chatId;
        currentChatType = type;
        document.getElementById('connectionStatus').innerText = type === 'channel' ? '📢 канал' : '👤 личный чат';
        document.getElementById('chatWithLabel').innerHTML = `💬 ${type === 'channel' ? 'канал' : 'чат'} ${peerInfo}`;
        if (messagesUpdateInterval) clearInterval(messagesUpdateInterval);
        await loadMessages();
        messagesUpdateInterval = setInterval(loadMessages, 30000);
    }

    async function loadMessages() {
        if (!currentChatId) return;
        let msgs = [];
        if (currentChatType === 'channel') {
            msgs = await getChannelMessages(currentChatId);
        } else {
            msgs = await getPrivateMessages(currentChatId);
        }
        const container = document.getElementById('messagesContainer');
        const currentCount = container.children.length;
        if (msgs.length > currentCount) {
            const newMsgs = msgs.slice(currentCount);
            newMsgs.forEach(m => {
                const isOwn = m.senderId === myId;
                addMessageToChat(`${m.senderName || m.senderId}: ${m.text}`, isOwn);
            });
        }
    }

    window.onload = async function () {
        const hasConfig = loadGitHubConfig();

        if (hasConfig) {
            document.getElementById('githubSetupCard').style.display = 'none';
            if (loadOwnProfile()) {
                document.getElementById('registerCard').style.display = 'none';
                document.getElementById('mainInterface').style.display = 'block';
                document.getElementById('myIdDisplay').innerText = myId;
            } else {
                document.getElementById('registerCard').style.display = 'block';
                document.getElementById('mainInterface').style.display = 'none';
            }
            await getDatabaseFromGitHub();
            setInterval(async () => { await getDatabaseFromGitHub(); }, 30000);
        } else {
            document.getElementById('githubSetupCard').style.display = 'block';
            document.getElementById('registerCard').style.display = 'block';
            document.getElementById('mainInterface').style.display = 'none';
        }

        document.getElementById('globalGithubBtn').onclick = () => {
            document.getElementById('githubSetupCard').style.display = 'block';
        };

        document.getElementById('closeSetupBtn').onclick = () => {
            document.getElementById('githubSetupCard').style.display = 'none';
        };

        document.getElementById('showUserRegBtn').onclick = () => {
            document.getElementById('userRegBlock').style.display = 'block';
            document.getElementById('channelRegBlock').style.display = 'none';
            document.getElementById('registrationError').style.display = 'none';
        };
        document.getElementById('showChannelRegBtn').onclick = () => {
            document.getElementById('userRegBlock').style.display = 'none';
            document.getElementById('channelRegBlock').style.display = 'block';
            document.getElementById('registrationError').style.display = 'none';
        };

        document.getElementById('saveGitHubBtn').onclick = async function () {
            if (saveGitHubConfig()) {
                document.getElementById('githubSetupCard').style.display = 'none';
                document.getElementById('registerCard').style.display = 'block';
                document.getElementById('mainInterface').style.display = 'none';
                await getDatabaseFromGitHub();
                setInterval(async () => { await getDatabaseFromGitHub(); }, 30000);
            }
        };

        document.getElementById('registerBtn').onclick = async function () {
            if (!githubConfig) {
                document.getElementById('registrationError').style.display = 'block';
                document.getElementById('registrationError').innerText = '❌ сначала настрой GitHub';
                return;
            }
            const name = document.getElementById('firstName').value.trim();
            const surname = document.getElementById('lastName').value.trim();
            if (!name || !surname) { 
                document.getElementById('registrationError').style.display = 'block';
                document.getElementById('registrationError').innerText = '❌ введи имя и фамилию';
                return; 
            }
            const newId = generatePersonId();
            const result = await appendToDatabase(`${name}_${surname}`, newId);
            if (result.success) {
                myId = newId; myName = name; mySurname = surname; myIsChannel = false;
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name, surname, isChannel: false }));
                document.getElementById('registerCard').style.display = 'none';
                document.getElementById('mainInterface').style.display = 'block';
                document.getElementById('myIdDisplay').innerText = myId;
                await getDatabaseFromGitHub();
                document.getElementById('registrationError').style.display = 'none';
            } else {
                document.getElementById('registrationError').style.display = 'block';
                document.getElementById('registrationError').innerText = `❌ ошибка: ${result.error}`;
            }
        };

        document.getElementById('createChannelBtn').onclick = async function () {
            if (!githubConfig) {
                document.getElementById('registrationError').style.display = 'block';
                document.getElementById('registrationError').innerText = '❌ сначала настрой GitHub';
                return;
            }
            const chName = document.getElementById('channelName').value.trim();
            if (!chName) { 
                document.getElementById('registrationError').style.display = 'block';
                document.getElementById('registrationError').innerText = '❌ введи название канала';
                return; 
            }
            const newId = generateChannelId();
            const result = await appendToDatabase(`channel_${chName}`, newId);
            if (result.success) {
                myId = newId; myName = chName; mySurname = ''; myIsChannel = true;
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: chName, surname: '', isChannel: true }));
                document.getElementById('registerCard').style.display = 'none';
                document.getElementById('mainInterface').style.display = 'block';
                document.getElementById('myIdDisplay').innerText = myId;
                await getDatabaseFromGitHub();
                document.getElementById('registrationError').style.display = 'none';
            } else {
                document.getElementById('registrationError').style.display = 'block';
                document.getElementById('registrationError').innerText = `❌ ошибка: ${result.error}`;
            }
        };

        document.getElementById('copyIdBtn').onclick = () => {
            navigator.clipboard.writeText(myId);
            alert('ID скопирован');
        };

        document.getElementById('searchBtn').onclick = async function () {
            const searchId = document.getElementById('searchIdInput').value.trim();
            if (!searchId) return;

            const entry = dbCache.find(e => e.id === searchId);
            const resDiv = document.getElementById('searchResult');
            const errorDiv = document.getElementById('registrationError');
            
            if (!entry) {
                resDiv.innerHTML = '<div class="search-info" style="border-color:#ff5555;"><span style="color:#ffaaaa;">❌ не найден</span></div>';
                return;
            }

            if (entry.id.endsWith('_channel')) {
                resDiv.innerHTML = `<div class="search-info">
                    <span style="font-size:1.4rem;">📢</span>
                    <span style="color:#b4e0ff; font-weight:500;">${entry.rawName.replace('channel_','')}</span>
                    <span style="color:#8899aa; margin-left:auto;">вход в канал...</span>
                </div>`;
                await enterChat(entry.id, 'channel', entry.rawName.replace('channel_',''));
            } else {
                if (!myId) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = '❌ ты не зарегистрирован';
                    return;
                }
                const nameParts = entry.rawName.split('_');
                const firstName = nameParts[0] || '';
                const lastName = nameParts[1] || '';
                resDiv.innerHTML = `<div class="search-info">
                    <span style="font-size:1.4rem;">👤</span>
                    <span style="color:#b4e0ff; font-weight:500;">${firstName} ${lastName}</span>
                    <span style="color:#8899aa; margin-left:auto;">вход в чат...</span>
                </div>`;
                await enterChat(entry.id, 'private', `${firstName} ${lastName}`);
            }
        };

        document.getElementById('sendMsgBtn').onclick = async function () {
            const msg = document.getElementById('messageInput').value.trim();
            if (!msg || !currentChatId) {
                alert('нет активного чата');
                return;
            }
            const senderName = myIsChannel ? `📢 ${myName}` : `${myName} ${mySurname}`.trim() || myId;
            const msgObj = { 
                text: msg, 
                senderId: myId,
                senderName: senderName,
                time: Date.now() 
            };
            if (currentChatType === 'channel') {
                await appendToChannelMessages(currentChatId, msgObj);
            } else {
                await appendToPrivateMessages(currentChatId, msgObj);
            }
            addMessageToChat(`${senderName}: ${msg}`, true);
            document.getElementById('messageInput').value = '';
            await loadMessages();
        };

        document.getElementById('messageInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                document.getElementById('sendMsgBtn').click(); 
            }
        });
    };
</script>
</body>
</html>
