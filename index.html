<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>halal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0b141a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            transition: background-color 0.3s, color 0.2s;
        }

        :root {
            --bg-primary: #17212b;
            --bg-secondary: #0b141a;
            --bg-sidebar: #17212b;
            --bg-header: #1e2b36;
            --bg-input: #242f3d;
            --text-primary: #fff;
            --text-secondary: #8e9fad;
            --border-color: #0f1a22;
            --message-own-bg: #d4af37;
            --message-other-bg: #182533;
            --accent-color: #d4af37;
            --hover-bg: #2b3b4a;
        }

        body.light-theme {
            --bg-primary: #f0f4fa;
            --bg-secondary: #e6ecf5;
            --bg-sidebar: #ffffff;
            --bg-header: #dbe2ed;
            --bg-input: #c9d4e3;
            --text-primary: #000;
            --text-secondary: #4a5a6e;
            --border-color: #b0c4de;
            --message-own-bg: #d4af37;
            --message-other-bg: #ffffff;
            --accent-color: #d4af37;
            --hover-bg: #c0cbd8;
        }

        body.grey-theme {
            --bg-primary: #2c2f33;
            --bg-secondary: #23272a;
            --bg-sidebar: #2c2f33;
            --bg-header: #3a3f44;
            --bg-input: #40454a;
            --text-primary: #fff;
            --text-secondary: #99aab5;
            --border-color: #202225;
            --message-own-bg: #5865f2;
            --message-other-bg: #3a3f44;
            --accent-color: #5865f2;
            --hover-bg: #40474f;
        }

        body.own-color-gold {
            --message-own-bg: #d4af37;
        }
        body.own-color-blue {
            --message-own-bg: #2b5278;
        }
        body.own-color-green {
            --message-own-bg: #2e7d32;
        }

        .app {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: var(--bg-primary);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            transform: translateX(0);
            z-index: 2;
        }

        .sidebar.hide {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            transition: transform 0.2s, background-color 0.3s;
        }

        .user-info:hover .avatar {
            transform: scale(1.1);
        }

        .animated-emoji {
            display: inline-block;
            animation: pulseRotate 2s infinite ease-in-out;
        }

        @keyframes pulseRotate {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(5deg); }
            50% { transform: scale(1) rotate(0deg); }
            75% { transform: scale(1.1) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .user-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.2s;
        }

        .icon-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .search-box {
            padding: 10px 15px;
            background: var(--bg-header);
            transition: background-color 0.3s;
        }

        .search-box input {
            width: 100%;
            background: var(--bg-input);
            border: none;
            border-radius: 22px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: background-color 0.3s, color 0.2s;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-item:hover {
            background: var(--hover-bg);
        }

        .chat-item.active {
            background: var(--bg-input);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
            transition: transform 0.2s, background-color 0.3s;
        }

        .chat-item:hover .chat-avatar {
            transform: scale(1.05);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .games-btn-container {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-sidebar);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .games-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s, color 0.2s;
        }

        .games-btn:hover {
            background: var(--accent-color);
        }

        .chat-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, background-color 0.3s;
            transform: translateX(100%);
            z-index: 3;
        }

        .chat-panel.show {
            transform: translateX(0);
        }

        .chat-header {
            padding: 10px 20px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.15s, color 0.2s;
        }

        .back-button:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .chat-header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            animation: pulse 3s infinite;
            transition: background-color 0.3s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background-color: var(--accent-color); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }

        .chat-header-info h3 {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.2s;
        }

        .chat-header-info span {
            font-size: 13px;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-secondary);
            transition: background-color 0.3s;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other-bg);
            align-self: flex-start;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            transition: all 0.2s;
        }

        .message.own {
            background: var(--message-own-bg);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.new {
            animation: messageGlow 0.6s ease-out;
        }

        @keyframes messageGlow {
            0% {
                opacity: 0;
                transform: scale(0.7);
                background: #ffaa00;
                color: #000;
                box-shadow: 0 0 20px #ffaa00;
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
                background: #ffd966;
                color: #000;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                background: inherit;
                color: inherit;
                box-shadow: none;
            }
        }

        .message .sender-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .message-input-area {
            padding: 15px 20px;
            background: var(--bg-header);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            align-items: flex-end;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .message-input-area textarea {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 25px;
            padding: 14px 20px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 120px;
            outline: none;
            transition: background-color 0.3s, color 0.2s, box-shadow 0.2s;
        }

        .message-input-area textarea:focus {
            box-shadow: 0 0 10px var(--accent-color), 0 0 20px var(--accent-color);
        }

        .send-btn {
            background: var(--accent-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, background-color 0.3s;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        .send-btn.animate {
            animation: sendPop 0.3s ease;
        }

        @keyframes sendPop {
            0% { transform: scale(1); background: #ffaa00; }
            50% { transform: scale(1.3); background: #ffd966; }
            100% { transform: scale(1); background: var(--accent-color); }
        }

        .send-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .send-btn:hover {
            filter: brightness(1.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 20px;
            width: 90%;
            max-width: 360px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.3s;
            color: var(--text-primary);
            transition: background-color 0.3s, border-color 0.3s;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--accent-color);
            transition: color 0.2s;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 14px 18px;
            color: var(--text-primary);
            margin-bottom: 15px;
            transition: background-color 0.3s, border-color 0.3s, color 0.2s;
        }

        .modal-content button {
            background: var(--accent-color);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.3s;
        }

        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .modal-tab {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            padding: 10px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background-color 0.3s, color 0.2s;
        }

        .modal-tab.active {
            background: var(--accent-color);
            color: white;
        }

        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .error-text {
            color: #ff8a8a;
            background: #2a1f1f;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .success-text {
            color: #8aff8a;
            background: #1f2a1f;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 10;
            display: none;
            flex-direction: column;
        }

        .iframe-container.active {
            display: flex;
        }

        .iframe-header {
            padding: 15px 20px;
            background: var(--bg-header);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background-color 0.3s;
        }

        .iframe-header button {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
        }

        .iframe-header h3 {
            color: var(--accent-color);
        }

        iframe {
            width: 100%;
            flex: 1;
            border: none;
        }

        .customize-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }

        .customize-options label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .customize-options select {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info" id="userInfoBlock">
                    <div class="avatar" id="avatarPlaceholder">H</div>
                    <span class="user-name" id="sidebarUserName">
                        <span class="animated-emoji">🤖</span> halal
                    </span>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="globalGithubBtn" title="Настройки GitHub">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.26-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.38.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.58.68.5C19.14 20.16 22 16.42 22 12c0-5.52-4.48-10-10-10z"/></svg>
                    </button>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchIdInput" placeholder="🔍 Поиск по ID...">
            </div>

            <div class="chats-list" id="chatsList">
            </div>

            <div class="games-btn-container">
                <button class="games-btn" id="gamesButton">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15 7.5V2H9v5.5l3 3 3-3zM7.5 9H2v6h5.5l3-3-3-3zM9 16.5V22h6v-5.5l-3-3-3 3zM16.5 9l-3 3 3 3H22V9h-5.5z"/></svg>
                    Игры
                </button>
            </div>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-left">
                    <button class="back-button" id="backToChatsBtn" title="Назад к списку чатов">←</button>
                    <div class="chat-header-avatar" id="chatAvatar">👤</div>
                    <div class="chat-header-info">
                        <h3 id="chatTitle">Выберите чат</h3>
                        <span id="chatStatus" class="badge"></span>
                    </div>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div style="color: var(--text-secondary); text-align: center; padding: 40px;">👋 Начните общение</div>
            </div>

            <div class="message-input-area" id="messageArea" style="display: none;">
                <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
                <button class="send-btn" id="sendMsgBtn">
                    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
                </button>
            </div>

            <div class="iframe-container" id="gamesContainer">
                <div class="iframe-header">
                    <button id="backFromGamesBtn">← Назад</button>
                    <h3>halal games — Фрукты</h3>
                </div>
                <iframe src="https://blashenny363-ux.github.io/frukti/" title="Игра Фрукты"></iframe>
            </div>
        </div>

        <div class="modal" id="githubModal">
            <div class="modal-content">
                <span class="modal-close" id="closeModalBtn">&times;</span>
                <h3>🔧 Доступ к базе GitHub</h3>
                <input type="text" id="githubToken" placeholder="Классический токен (repo)" value="">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="githubOwner" placeholder="Владелец" value="blashenny363-ux" style="flex:1;">
                    <input type="text" id="githubRepo" placeholder="Репозиторий" value="halal" style="flex:1;">
                </div>
                <input type="text" id="githubPath" placeholder="Путь к database.txt" value="database.txt">
                <button id="saveGitHubBtn">💾 Сохранить</button>
                <div id="githubStatus" class="small-note" style="color: var(--text-secondary); margin-top: 10px;"></div>
            </div>
        </div>

        <div class="modal" id="registerModal">
            <div class="modal-content">
                <h3>📱 Регистрация / Вход</h3>
                <div class="modal-tabs">
                    <button class="modal-tab active" id="tabRegister">Регистрация</button>
                    <button class="modal-tab" id="tabLogin">Вход</button>
                </div>
                <div id="registerBlock">
                    <input type="text" id="regName" placeholder="Имя">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button id="registerBtn">Зарегистрироваться</button>
                </div>
                <div id="loginBlock" style="display: none;">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                </div>
                <div id="authError" class="error-text" style="display: none;"></div>
                <div id="authSuccess" class="success-text" style="display: none;"></div>
            </div>
        </div>

        <div class="modal" id="customizeModal">
            <div class="modal-content">
                <span class="modal-close" id="closeCustomizeBtn">&times;</span>
                <h3>🎨 Настройки внешнего вида</h3>
                <div class="customize-options">
                    <label>Тема:
                        <select id="themeSelect">
                            <option value="dark">Тёмная</option>
                            <option value="light">Светлая</option>
                            <option value="grey">Серая</option>
                        </select>
                    </label>
                    <label>Цвет моих сообщений:
                        <select id="ownColorSelect">
                            <option value="gold">Золотой</option>
                            <option value="blue">Синий</option>
                            <option value="green">Зелёный</option>
                        </select>
                    </label>
                </div>
                <button id="saveCustomizeBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let myId = null;
        let myName = null;
        let myEmail = null;
        let myIsChannel = false;
        let githubConfig = null;
        let dbCache = [];
        let currentChatId = null;
        let currentChatType = null;
        let currentPeerInfo = '';
        let messagesUpdateInterval = null;
        let dbUpdateInterval = null;
        let chats = [];
        let prevMessagesCount = 0;
        let users = JSON.parse(localStorage.getItem('halal_users')) || [];

        function generatePersonId() { return 'p_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_person'; }

        async function getDatabaseFromGitHub() {
            if (!githubConfig) return [];
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 404) {
                    await createEmptyDatabaseFile();
                    return [];
                }
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(`GitHub ${res.status}: ${err.message}`);
                }
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const lines = content.trim().split('\n').filter(l => l.trim());
                const items = lines.map(line => {
                    const [rawName, id] = line.split(' ');
                    return { rawName, id, name: rawName, surname: '' };
                }).filter(i => i.id);
                dbCache = items;
                return items;
            } catch (e) {
                document.getElementById('githubStatus').innerHTML = `<span style="color:#ffaaaa;">❌ ошибка чтения: ${e.message}</span>`;
                return [];
            }
        }

        async function createEmptyDatabaseFile() {
            if (!githubConfig) return;
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify({ 
                    message: 'init database', 
                    content: btoa(unescape(encodeURIComponent(''))) 
                })
            });
        }

        async function appendToDatabase(entryName, id) {
            if (!githubConfig) return { success: false, error: 'GitHub не настроен' };
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            let sha = null, currentContent = '';
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentContent = decodeURIComponent(escape(atob(data.content)));
                }
            } catch (e) {}
            const newLine = `${entryName} ${id}`;
            const newContent = currentContent + (currentContent.endsWith('\n') || !currentContent ? '' : '\n') + newLine + '\n';
            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ 
                        message: `add ${entryName}`, 
                        content: btoa(unescape(encodeURIComponent(newContent))), 
                        sha: sha || undefined 
                    })
                });
                dbCache.push({ rawName: entryName, id, name: entryName, surname: '' });
                return { success: true };
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        async function getChannelMessages(channelId) {
            if (!githubConfig) return [];
            const { token, owner, repo } = githubConfig;
            const path = `channel_${channelId}.txt`;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 404) return [];
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                return content.trim().split('\n').filter(l => l).map(line => {
                    try { return JSON.parse(line); } catch { return null; }
                }).filter(m => m);
            } catch { return []; }
        }

        async function appendToChannelMessages(channelId, msgObj) {
            if (!githubConfig) return;
            const { token, owner, repo } = githubConfig;
            const path = `channel_${channelId}.txt`;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            let sha = null, currentContent = '';
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentContent = decodeURIComponent(escape(atob(data.content)));
                }
            } catch (e) {}
            const newLine = JSON.stringify(msgObj);
            const newContent = currentContent + (currentContent ? '\n' : '') + newLine;
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify({ 
                    message: `message in ${channelId}`, 
                    content: btoa(unescape(encodeURIComponent(newContent))), 
                    sha: sha || undefined 
                })
            });
        }

        async function getPrivateMessages(peerId) {
            if (!githubConfig || !myId) return [];
            const ids = [myId, peerId].sort();
            const chatId = `private_${ids[0]}_${ids[1]}`;
            const { token, owner, repo } = githubConfig;
            const path = `${chatId}.txt`;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 404) return [];
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                return content.trim().split('\n').filter(l => l).map(line => {
                    try { return JSON.parse(line); } catch { return null; }
                }).filter(m => m);
            } catch { return []; }
        }

        async function appendToPrivateMessages(peerId, msgObj) {
            if (!githubConfig || !myId) return;
            const ids = [myId, peerId].sort();
            const chatId = `private_${ids[0]}_${ids[1]}`;
            const { token, owner, repo } = githubConfig;
            const path = `${chatId}.txt`;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            let sha = null, currentContent = '';
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentContent = decodeURIComponent(escape(atob(data.content)));
                }
            } catch (e) {}
            const newLine = JSON.stringify(msgObj);
            const newContent = currentContent + (currentContent ? '\n' : '') + newLine;
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify({ 
                    message: `private message`, 
                    content: btoa(unescape(encodeURIComponent(newContent))), 
                    sha: sha || undefined 
                })
            });
        }

        function loadGitHubConfig() {
            const stored = localStorage.getItem('halal_github_config');
            if (stored) {
                githubConfig = JSON.parse(stored);
                document.getElementById('githubToken').value = githubConfig.token || '';
                document.getElementById('githubOwner').value = githubConfig.owner || '';
                document.getElementById('githubRepo').value = githubConfig.repo || '';
                document.getElementById('githubPath').value = githubConfig.path || 'database.txt';
                return true;
            }
            return false;
        }

        function saveGitHubConfig() {
            const token = document.getElementById('githubToken').value.trim();
            const owner = document.getElementById('githubOwner').value.trim();
            const repo = document.getElementById('githubRepo').value.trim();
            let path = document.getElementById('githubPath').value.trim() || 'database.txt';
            if (!token || !owner || !repo) { 
                document.getElementById('githubStatus').innerHTML = '<span style="color:#ffaaaa;">❌ заполни все поля</span>';
                return false; 
            }
            githubConfig = { token, owner, repo, path };
            localStorage.setItem('halal_github_config', JSON.stringify(githubConfig));
            document.getElementById('githubStatus').innerHTML = '<span style="color:#aaffaa;">✅ настройки сохранены</span>';
            return true;
        }

        function loadOwnProfile() {
            const stored = localStorage.getItem('halal_my_profile');
            if (stored) {
                const p = JSON.parse(stored);
                myId = p.id;
                myName = p.name;
                myEmail = p.email;
                return true;
            }
            return false;
        }

        function updateSidebarUserInfo() {
            const avatar = document.getElementById('avatarPlaceholder');
            const userNameSpan = document.getElementById('sidebarUserName');
            avatar.textContent = myName ? myName.charAt(0).toUpperCase() : 'H';
            userNameSpan.innerHTML = `<span class="animated-emoji">👤</span> ${myName || 'halal'}`;
        }

        function loadChatsFromStorage() {
            const stored = localStorage.getItem('halal_chats');
            if (stored) {
                chats = JSON.parse(stored);
                renderChatsList();
            }
        }

        function saveChatsToStorage() {
            localStorage.setItem('halal_chats', JSON.stringify(chats));
        }

        function renderChatsList() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            if (chats.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align:center; padding:20px;">Нет чатов</div>';
                return;
            }
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.dataset.id = chat.id;
                div.dataset.type = chat.type;
                div.dataset.name = chat.name;
                div.innerHTML = `
                    <div class="chat-avatar">${chat.name.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div class="chat-name">${chat.name}</div>
                        <div class="chat-preview">${chat.lastMessage || '...'}</div>
                    </div>
                `;
                div.addEventListener('click', () => {
                    enterChat(chat.id, chat.type, chat.name);
                });
                container.appendChild(div);
            });
        }

        function showSidebar() {
            document.getElementById('sidebar').classList.remove('hide');
            document.getElementById('chatPanel').classList.remove('show');
        }

        function showChat() {
            document.getElementById('sidebar').classList.add('hide');
            document.getElementById('chatPanel').classList.add('show');
        }

        function animateNewMessages() {
            const container = document.getElementById('messagesContainer');
            const messages = container.children;
            const newCount = messages.length;
            const diff = newCount - prevMessagesCount;
            if (diff > 0) {
                for (let i = newCount - diff; i < newCount; i++) {
                    messages[i].classList.add('new');
                    setTimeout(() => {
                        messages[i].classList.remove('new');
                    }, 600);
                }
            }
            prevMessagesCount = newCount;
        }

        async function enterChat(chatId, type, peerInfo) {
            document.getElementById('gamesContainer').classList.remove('active');
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageArea').style.display = 'flex';
            document.getElementById('messagesContainer').style.display = 'flex';

            currentChatId = chatId;
            currentChatType = type;
            currentPeerInfo = peerInfo;

            document.getElementById('chatTitle').innerText = peerInfo;
            document.getElementById('chatStatus').innerText = type === 'channel' ? '📢 канал' : '👤 личный чат';
            document.getElementById('chatAvatar').innerText = peerInfo.charAt(0).toUpperCase();

            renderChatsList();

            document.getElementById('messagesContainer').innerHTML = '';
            prevMessagesCount = 0;
            if (messagesUpdateInterval) clearInterval(messagesUpdateInterval);
            await loadMessages();
            messagesUpdateInterval = setInterval(loadMessages, 3000);

            showChat();
        }

        async function loadMessages() {
            if (!currentChatId) return;
            let msgs = [];
            if (currentChatType === 'channel') {
                msgs = await getChannelMessages(currentChatId);
            } else {
                msgs = await getPrivateMessages(currentChatId);
            }
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            msgs.forEach(m => {
                const isOwn = m.senderId === myId;
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                if (isOwn) msgDiv.classList.add('own');
                if (currentChatType === 'channel' && !isOwn) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'sender-name';
                    nameSpan.innerText = m.senderName || 'Неизвестно';
                    msgDiv.appendChild(nameSpan);
                }
                const textNode = document.createTextNode(m.text);
                msgDiv.appendChild(textNode);
                container.appendChild(msgDiv);
            });
            animateNewMessages();
            container.scrollTop = container.scrollHeight;
        }

        async function addChatFromSearch(searchId) {
            const entry = dbCache.find(e => e.id === searchId);
            if (!entry) return null;

            let chatName = '';
            let type = '';
            if (entry.id.endsWith('_channel')) {
                chatName = entry.rawName.replace('channel_', '');
                type = 'channel';
            } else {
                const parts = entry.rawName.split('_');
                chatName = parts[0] + ' ' + (parts[1] || '');
                type = 'private';
            }

            if (!chats.find(c => c.id === entry.id)) {
                chats.push({ id: entry.id, name: chatName, type, lastMessage: '' });
                saveChatsToStorage();
                renderChatsList();
            }
            return { id: entry.id, name: chatName, type };
        }

        function applyCustomization(theme, ownColor) {
            document.body.classList.remove('light-theme', 'grey-theme', 'own-color-gold', 'own-color-blue', 'own-color-green');
            if (theme === 'light') document.body.classList.add('light-theme');
            else if (theme === 'grey') document.body.classList.add('grey-theme');
            if (ownColor === 'gold') document.body.classList.add('own-color-gold');
            else if (ownColor === 'blue') document.body.classList.add('own-color-blue');
            else if (ownColor === 'green') document.body.classList.add('own-color-green');
        }

        function loadCustomization() {
            const theme = localStorage.getItem('halal_theme') || 'dark';
            const ownColor = localStorage.getItem('halal_own_color') || 'gold';
            document.getElementById('themeSelect').value = theme;
            document.getElementById('ownColorSelect').value = ownColor;
            applyCustomization(theme, ownColor);
        }

        window.onload = async function () {
            const modalGithub = document.getElementById('githubModal');
            const modalRegister = document.getElementById('registerModal');
            const modalCustomize = document.getElementById('customizeModal');
            const hasConfig = loadGitHubConfig();

            loadCustomization();

            document.getElementById('userInfoBlock').addEventListener('click', () => {
                modalCustomize.classList.add('active');
            });

            document.getElementById('closeCustomizeBtn').onclick = () => {
                modalCustomize.classList.remove('active');
            };

            document.getElementById('saveCustomizeBtn').onclick = () => {
                const theme = document.getElementById('themeSelect').value;
                const ownColor = document.getElementById('ownColorSelect').value;
                localStorage.setItem('halal_theme', theme);
                localStorage.setItem('halal_own_color', ownColor);
                applyCustomization(theme, ownColor);
                modalCustomize.classList.remove('active');
            };

            if (!hasConfig) {
                modalGithub.classList.add('active');
            } else {
                if (!loadOwnProfile()) {
                    modalRegister.classList.add('active');
                } else {
                    modalGithub.classList.remove('active');
                    modalRegister.classList.remove('active');
                    updateSidebarUserInfo();
                    loadChatsFromStorage();
                    await getDatabaseFromGitHub();
                    dbUpdateInterval = setInterval(async () => {
                        await getDatabaseFromGitHub();
                    }, 3000);
                }
            }

            document.getElementById('globalGithubBtn').onclick = () => {
                modalGithub.classList.add('active');
            };
            document.getElementById('closeModalBtn').onclick = () => {
                modalGithub.classList.remove('active');
            };
            document.getElementById('saveGitHubBtn').onclick = async function () {
                if (saveGitHubConfig()) {
                    modalGithub.classList.remove('active');
                    if (!loadOwnProfile()) {
                        modalRegister.classList.add('active');
                    } else {
                        await getDatabaseFromGitHub();
                        if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                        dbUpdateInterval = setInterval(async () => {
                            await getDatabaseFromGitHub();
                        }, 3000);
                    }
                }
            };

            document.getElementById('tabRegister').onclick = () => {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('registerBlock').style.display = 'block';
                document.getElementById('loginBlock').style.display = 'none';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
            };
            document.getElementById('tabLogin').onclick = () => {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
                document.getElementById('registerBlock').style.display = 'none';
                document.getElementById('loginBlock').style.display = 'block';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
            };

            document.getElementById('registerBtn').onclick = async function () {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                if (!name || !email || !password) {
                    document.getElementById('authError').innerText = '❌ Заполните все поля';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                if (users.find(u => u.email === email)) {
                    document.getElementById('authError').innerText = '❌ Пользователь с таким email уже существует';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                const newId = generatePersonId();
                users.push({ name, email, password, id: newId });
                localStorage.setItem('halal_users', JSON.stringify(users));
                myId = newId;
                myName = name;
                myEmail = email;
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name, email }));
                modalRegister.classList.remove('active');
                updateSidebarUserInfo();
                loadChatsFromStorage();
                await getDatabaseFromGitHub();
                await appendToDatabase(name, newId);
                if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                dbUpdateInterval = setInterval(async () => {
                    await getDatabaseFromGitHub();
                }, 3000);
            };

            document.getElementById('loginBtn').onclick = async function () {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                const user = users.find(u => u.email === email && u.password === password);
                if (!user) {
                    document.getElementById('authError').innerText = '❌ Неверный email или пароль';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                myId = user.id;
                myName = user.name;
                myEmail = user.email;
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: myName, email: myEmail }));
                modalRegister.classList.remove('active');
                updateSidebarUserInfo();
                loadChatsFromStorage();
                await getDatabaseFromGitHub();
                if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                dbUpdateInterval = setInterval(async () => {
                    await getDatabaseFromGitHub();
                }, 3000);
            };

            document.getElementById('searchIdInput').addEventListener('keypress', async function (e) {
                if (e.key === 'Enter') {
                    const searchId = this.value.trim();
                    if (!searchId) return;
                    const chatInfo = await addChatFromSearch(searchId);
                    if (chatInfo) {
                        enterChat(chatInfo.id, chatInfo.type, chatInfo.name);
                    } else {
                        alert('ID не найден');
                    }
                    this.value = '';
                }
            });

            document.getElementById('sendMsgBtn').onclick = async function () {
                const msg = document.getElementById('messageInput').value.trim();
                if (!msg || !currentChatId) {
                    alert('Нет активного чата');
                    return;
                }
                const senderName = myName || myId;
                const msgObj = { 
                    text: msg, 
                    senderId: myId,
                    senderName: senderName,
                    time: Date.now() 
                };
                if (currentChatType === 'channel') {
                    await appendToChannelMessages(currentChatId, msgObj);
                } else {
                    await appendToPrivateMessages(currentChatId, msgObj);
                }
                document.getElementById('messageInput').value = '';
                const sendBtn = document.getElementById('sendMsgBtn');
                sendBtn.classList.add('animate');
                setTimeout(() => sendBtn.classList.remove('animate'), 300);
                await loadMessages();
            };

            document.getElementById('messageInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    document.getElementById('sendMsgBtn').click(); 
                }
            });

            document.getElementById('gamesButton').onclick = () => {
                document.getElementById('gamesContainer').classList.add('active');
                document.getElementById('chatHeader').style.display = 'none';
                document.getElementById('messageArea').style.display = 'none';
                document.getElementById('messagesContainer').style.display = 'none';
            };
            document.getElementById('backFromGamesBtn').onclick = () => {
                document.getElementById('gamesContainer').classList.remove('active');
                if (currentChatId) {
                    document.getElementById('chatHeader').style.display = 'flex';
                    document.getElementById('messageArea').style.display = 'flex';
                    document.getElementById('messagesContainer').style.display = 'flex';
                } else {
                    document.getElementById('chatHeader').style.display = 'none';
                    document.getElementById('messageArea').style.display = 'none';
                    document.getElementById('messagesContainer').innerHTML = '<div style="color: var(--text-secondary); text-align:center; padding:40px;">👋 Начните общение</div>';
                }
            };

            document.getElementById('backToChatsBtn').onclick = () => {
                showSidebar();
            };
        };
    </script>
</body>
</html>
