<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>halal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0b141a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }
        :root {
            --bg-primary: #17212b;
            --bg-secondary: #0b141a;
            --bg-sidebar: #17212b;
            --bg-header: #1e2b36;
            --bg-input: #242f3d;
            --text-primary: #fff;
            --text-secondary: #8e9fad;
            --border-color: #0f1a22;
            --message-own-bg: #2e7d32;
            --message-other-bg: #182533;
            --accent-color: #2e7d32;
            --hover-bg: #2b3b4a;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.3);
            --border-radius-message: 18px;
            --border-radius-item: 16px;
            --transition: all 0.2s ease;
        }
        body.light-theme {
            --bg-primary: #f0f4fa;
            --bg-secondary: #e6ecf5;
            --bg-sidebar: #ffffff;
            --bg-header: #dbe2ed;
            --bg-input: #c9d4e3;
            --text-primary: #1a2634;
            --text-secondary: #4a5a6e;
            --border-color: #b0c4de;
            --message-own-bg: #2e7d32;
            --message-other-bg: #ffffff;
            --accent-color: #2e7d32;
            --hover-bg: #c0cbd8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
        }
        body.grey-theme {
            --bg-primary: #2c2f33;
            --bg-secondary: #23272a;
            --bg-sidebar: #2c2f33;
            --bg-header: #3a3f44;
            --bg-input: #40454a;
            --text-primary: #fff;
            --text-secondary: #99aab5;
            --border-color: #202225;
            --message-own-bg: #2e7d32;
            --message-other-bg: #3a3f44;
            --accent-color: #2e7d32;
            --hover-bg: #40474f;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
        }
        body.own-color-gold { --message-own-bg: #d4af37; }
        body.own-color-blue { --message-own-bg: #2b5278; }
        body.own-color-green { --message-own-bg: #2e7d32; }
        body.own-color-red { --message-own-bg: #e53e3e; }
        body.own-color-purple { --message-own-bg: #9b59b6; }
        body.own-color-orange { --message-own-bg: #f39c12; }
        body.other-color-default { --message-other-bg: #182533; }
        body.other-color-light { --message-other-bg: #2a3a4a; }
        body.other-color-dark { --message-other-bg: #10171e; }
        body.other-color-mid { --message-other-bg: #1e2b36; }
        body.accent-color-gold { --accent-color: #d4af37; }
        body.accent-color-blue { --accent-color: #2b5278; }
        body.accent-color-green { --accent-color: #2e7d32; }
        body.accent-color-red { --accent-color: #e53e3e; }
        body.accent-color-purple { --accent-color: #9b59b6; }
        body.accent-color-orange { --accent-color: #f39c12; }

        .chats-list::-webkit-scrollbar,
        .messages-container::-webkit-scrollbar,
        .members-list::-webkit-scrollbar {
            width: 4px;
        }
        .chats-list::-webkit-scrollbar-track,
        .messages-container::-webkit-scrollbar-track,
        .members-list::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }
        .chats-list::-webkit-scrollbar-thumb,
        .messages-container::-webkit-scrollbar-thumb,
        .members-list::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        .app {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: var(--bg-primary);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            transition: background 0.3s ease;
            margin: 0 auto;
            z-index: 1;
            border-radius: 28px;
        }
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            transform: translateX(0);
            z-index: 2;
            backdrop-filter: blur(8px);
        }
        .sidebar.hide {
            transform: translateX(-100%);
        }
        .sidebar-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            object-fit: cover;
            border: 2px solid transparent;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-info:hover .avatar {
            transform: scale(1.05);
        }
        .user-name {
            font-weight: 600;
            font-size: 17px;
            color: var(--text-primary);
            transition: color 0.2s;
        }
        .sidebar-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .icon-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }
        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .search-box {
            padding: 12px 16px;
            background: var(--bg-header);
            transition: var(--transition);
        }
        .search-box input {
            width: 100%;
            background: var(--bg-input);
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
        }
        .search-box input:focus {
            box-shadow: 0 0 0 2px var(--accent-color), inset 0 2px 6px rgba(0,0,0,0.2);
        }
        .search-box input::placeholder {
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            margin: 2px 10px;
            border-radius: var(--border-radius-item);
        }
        .chat-item:hover {
            background: var(--hover-bg);
            transform: translateX(4px);
        }
        .chat-item.active {
            background: var(--bg-input);
            border-left: 4px solid var(--accent-color);
        }
        .chat-item.pinned {
            background: rgba(255, 215, 0, 0.1);
        }
        .chat-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            object-fit: cover;
            border: 2px solid transparent;
        }
        .chat-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-item:hover .chat-avatar {
            transform: scale(1.05);
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
            margin-bottom: 5px;
        }
        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .chat-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .chat-item:hover .chat-actions {
            opacity: 1;
        }
        .chat-action-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 16px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .chat-action-btn:hover {
            background: var(--accent-color);
            color: white;
        }
        .pin-indicator {
            color: gold;
            margin-left: 5px;
            font-size: 14px;
        }

        .chat-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            transform: translateX(100%);
            z-index: 4;
        }
        .chat-panel.show {
            transform: translateX(0);
        }
        .chat-header {
            padding: 12px 20px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .back-button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition);
        }
        .back-button:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }
        .chat-header-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            object-fit: cover;
            border: 2px solid transparent;
        }
        .chat-header-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-header-avatar:hover {
            transform: scale(1.05);
        }
        .chat-header-info {
            display: flex;
            flex-direction: column;
        }
        .chat-header-info h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            transition: color 0.2s;
        }
        .chat-header-info span {
            font-size: 13px;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .members-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .members-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: transparent;
            transition: var(--transition);
        }
        .message-wrapper {
            position: relative;
            max-width: 80%;
            align-self: flex-start;
            animation: slideIn 0.2s ease-out;
        }
        .message-wrapper.own {
            align-self: flex-end;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message {
            padding: 10px 14px;
            border-radius: var(--border-radius-message);
            background: var(--message-other-bg);
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .message.own {
            background: var(--message-own-bg);
            color: #fff;
        }
        .message .sender-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .message-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .message-image:hover {
            transform: scale(1.02);
        }
        .message-file {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }
        .message-file:hover {
            background: var(--hover-bg);
        }
        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .message-status {
            font-size: 14px;
            line-height: 1;
        }
        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .reaction {
            background: var(--bg-input);
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: var(--transition);
        }
        .reaction:hover {
            background: var(--accent-color);
            color: white;
        }
        .reaction-count {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .message-input-area {
            padding: 14px 18px;
            background: var(--bg-header);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            position: relative;
        }
        .attach-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .attach-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .attach-btn:hover {
            background: var(--accent-color);
            color: white;
        }
        .attach-menu {
            position: absolute;
            bottom: 72px;
            left: 18px;
            background: var(--bg-header);
            border-radius: 30px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(8px);
            transform: scale(0);
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
            transform-origin: bottom left;
            z-index: 10;
        }
        .attach-menu.active {
            transform: scale(1);
            opacity: 1;
        }
        .attach-menu-item {
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }
        .attach-menu-item:hover {
            background: var(--accent-color);
            color: white;
        }
        .message-input-area textarea {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 28px;
            padding: 14px 20px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
        .message-input-area textarea:focus {
            box-shadow: 0 0 0 2px var(--accent-color), inset 0 2px 6px rgba(0,0,0,0.2);
        }
        .send-btn {
            background: var(--accent-color);
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .send-btn:active {
            transform: scale(0.95);
        }
        .send-btn svg {
            width: 26px;
            height: 26px;
            fill: #fff;
        }
        .send-btn:hover {
            filter: brightness(1.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-primary);
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            animation: modalFadeIn 0.2s;
            color: var(--text-primary);
            transition: var(--transition);
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 22px;
        }
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 14px 18px;
            color: var(--text-primary);
            margin-bottom: 16px;
            transition: var(--transition);
            resize: vertical;
            font-size: 15px;
        }
        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            box-shadow: 0 0 0 2px var(--accent-color);
            outline: none;
        }
        .modal-content button {
            background: var(--accent-color);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            font-size: 16px;
        }
        .modal-content button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }
        .modal-content button.small {
            padding: 10px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .modal-tab {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            padding: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 15px;
        }
        .modal-tab.active {
            background: var(--accent-color);
            color: white;
        }
        .modal-close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--text-primary);
        }
        .error-text {
            color: #ff8a8a;
            background: #2a1f1f;
            padding: 12px;
            border-radius: 16px;
            margin-top: 10px;
            font-size: 14px;
        }
        .success-text {
            color: #8aff8a;
            background: #1f2a1f;
            padding: 12px;
            border-radius: 16px;
            margin-top: 10px;
            font-size: 14px;
        }

        .customize-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 20px 0;
        }
        .customize-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 16px;
        }
        .customize-section h4 {
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 17px;
        }
        .customize-options label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            font-size: 15px;
        }
        .customize-options select {

    <script>
        let myId = null;
        let myName = null;
        let myEmail = null;
        let myAvatar = null;
        let myBio = '';
        let githubConfig = null;
        let dbCache = { users: [], groups: [], groupMembers: [], messages: [] };
        let currentChatId = null;
        let currentChatType = null;
        let currentPeerInfo = '';
        let messagesUpdateInterval = null;
        let dbUpdateInterval = null;
        let chats = [];
        let users = JSON.parse(localStorage.getItem('halal_users')) || [];
        let longPressTimer = null;
        let currentMessageData = null;
        let displayedMessageTimestamps = new Set();

        function generatePersonId() { return 'p_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_person'; }
        function generateGroupId() { return 'g_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6) + '_group'; }

        async function loadDatabase() {
            if (!githubConfig) return;
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 404) {
                    await createEmptyDatabaseFile();
                    dbCache = { users: [], groups: [], groupMembers: [], messages: [] };
                    return;
                }
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(`GitHub ${res.status}: ${err.message}`);
                }
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const lines = content.trim().split('\n').filter(l => l.trim());
                const newCache = { users: [], groups: [], groupMembers: [], messages: [] };
                lines.forEach(line => {
                    const parts = line.split('|');
                    if (parts.length < 2) return;
                    const type = parts[0];
                    if (type === 'USER' && parts.length === 7) {
                        newCache.users.push({ name: parts[1], email: parts[2], password: parts[3], avatar: parts[4], bio: parts[5], id: parts[6] });
                    } else if (type === 'GROUP' && parts.length === 5) {
                        newCache.groups.push({ name: parts[1], avatar: parts[2], bgColor: parts[3], id: parts[4] });
                    } else if (type === 'GROUP_MEMBER' && parts.length === 3) {
                        newCache.groupMembers.push({ groupId: parts[1], userId: parts[2] });
                    } else if (type === 'MESSAGE' && parts.length === 9) {
                        newCache.messages.push({
                            chatId: parts[1],
                            senderId: parts[2],
                            text: parts[3],
                            image: parts[4],
                            file: parts[5],
                            reactions: parts[6] ? JSON.parse(parts[6]) : [],
                            timestamp: parseInt(parts[7]),
                            read: parts[8] === '1'
                        });
                    } else if (type === 'MESSAGE' && parts.length === 8) {
                        newCache.messages.push({
                            chatId: parts[1],
                            senderId: parts[2],
                            text: parts[3],
                            image: parts[4],
                            file: parts[5],
                            reactions: parts[6] ? JSON.parse(parts[6]) : [],
                            timestamp: parseInt(parts[7]),
                            read: false
                        });
                    }
                });
                dbCache = newCache;
                rebuildChatsFromAllData();
                if (currentChatId) {
                    await markMessagesAsRead();
                    updateChatHeaderAvatar();
                }
                if (currentChatId) updateMessages();
            } catch (e) {
                document.getElementById('githubStatus').innerHTML = `<span style="color:#ffaaaa;">❌ ошибка чтения: ${e.message}</span>`;
            }
        }

        function rebuildChatsFromAllData() {
            const newChats = [];
            const privateChatIds = new Set();
            dbCache.messages.forEach(msg => {
                if (msg.chatId.startsWith('private_')) {
                    privateChatIds.add(msg.chatId);
                }
            });
            privateChatIds.forEach(chatId => {
                const parts = chatId.split('_');
                const otherId = parts[1] === myId ? parts[2] : parts[1];
                const user = dbCache.users.find(u => u.id === otherId);
                const name = user ? user.name : 'Неизвестно';
                newChats.push({ id: chatId, name, type: 'private', lastMessage: '', pinned: false });
            });
            const myGroupIds = dbCache.groupMembers.filter(gm => gm.userId === myId).map(gm => gm.groupId);
            myGroupIds.forEach(groupId => {
                const group = dbCache.groups.find(g => g.id === groupId);
                if (group) {
                    newChats.push({ id: groupId, name: group.name, type: 'group', lastMessage: '', pinned: false });
                }
            });
            const pinnedMap = new Map();
            chats.forEach(chat => {
                if (chat.pinned) pinnedMap.set(chat.id, true);
            });
            const uniqueChats = [];
            const seen = new Set();
            newChats.forEach(chat => {
                if (!seen.has(chat.id)) {
                    seen.add(chat.id);
                    if (pinnedMap.has(chat.id)) chat.pinned = true;
                    uniqueChats.push(chat);
                }
            });
            chats = uniqueChats;
            saveChatsToStorage();
            renderChatsList();
        }

        async function createEmptyDatabaseFile() {
            if (!githubConfig) return;
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify({ message: 'init database', content: btoa(unescape(encodeURIComponent(''))) })
            });
        }

        async function appendToDatabase(line) {
            if (!githubConfig) return false;
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            let sha = null, currentContent = '';
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentContent = decodeURIComponent(escape(atob(data.content)));
                }
            } catch (e) {}
            const newContent = currentContent + (currentContent.endsWith('\n') || !currentContent ? '' : '\n') + line + '\n';
            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ message: `update database`, content: btoa(unescape(encodeURIComponent(newContent))), sha: sha || undefined })
                });
                return true;
            } catch (e) {
                return false;
            }
        }

        async function rewriteDatabase() {
            const lines = [];
            dbCache.users.forEach(u => lines.push(`USER|${u.name}|${u.email}|${u.password}|${u.avatar}|${u.bio}|${u.id}`));
            dbCache.groups.forEach(g => lines.push(`GROUP|${g.name}|${g.avatar}|${g.bgColor}|${g.id}`));
            dbCache.groupMembers.forEach(gm => lines.push(`GROUP_MEMBER|${gm.groupId}|${gm.userId}`));
            dbCache.messages.forEach(m => {
                const reactionsStr = JSON.stringify(m.reactions || []);
                lines.push(`MESSAGE|${m.chatId}|${m.senderId}|${m.text || ''}|${m.image || ''}|${m.file || ''}|${reactionsStr}|${m.timestamp}|${m.read ? '1' : '0'}`);
            });
            const newContent = lines.join('\n');
            const { token, owner, repo, path } = githubConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            let sha = null;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                }
            } catch (e) {}
            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ message: `update database`, content: btoa(unescape(encodeURIComponent(newContent))), sha: sha || undefined })
                });
                return true;
            } catch (e) {
                return false;
            }
        }

        async function uploadFileToGitHub(file, fileName) {
            if (!githubConfig) return null;
            const { token, owner, repo } = githubConfig;
            const path = `files/${fileName}`;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const reader = new FileReader();
            return new Promise((resolve) => {
                reader.onload = async function(e) {
                    const content = e.target.result.split(',')[1];
                    try {
                        const res = await fetch(url, {
                            method: 'PUT',
                            headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                            body: JSON.stringify({ message: `upload file ${fileName}`, content: content })
                        });
                        if (res.ok) {
                            const downloadUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}`;
                            resolve(downloadUrl);
                        } else {
                            resolve(null);
                        }
                    } catch {
                        resolve(null);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

            if (localUser) {

        async function addMessage(chatId, senderId, text, image, file) {
            const msg = {
                chatId,
                senderId,
                text: text || '',
                image: image || '',
                file: file || '',
                reactions: [],
                timestamp: Date.now(),
                read: false
            };
            dbCache.messages.push(msg);
            const reactionsStr = JSON.stringify([]);
            const line = `MESSAGE|${chatId}|${senderId}|${text || ''}|${image || ''}|${file || ''}|${reactionsStr}|${msg.timestamp}|0`;
            const success = await appendToDatabase(line);
            if (success) {
                rebuildChatsFromAllData();
                appendMessageToDOM(msg);
            }
        }

        function appendMessageToDOM(msg) {
            if (!currentChatId || msg.chatId !== currentChatId) return;
            if (displayedMessageTimestamps.has(msg.timestamp)) return;
            const container = document.getElementById('messagesContainer');
            const isOwn = msg.senderId === myId;
            const wrapper = createMessageElement(msg, isOwn);
            wrapper.classList.add('new');
            container.appendChild(wrapper);
            setTimeout(() => wrapper.classList.remove('new'), 400);
            container.scrollTop = container.scrollHeight;
            displayedMessageTimestamps.add(msg.timestamp);
            attachLongPressToElement(wrapper);
        }

        function createMessageElement(msg, isOwn) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isOwn ? 'own' : ''}`;
            wrapper.dataset.timestamp = msg.timestamp;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOwn ? 'own' : ''}`;
            const senderName = getSenderName(msg.senderId);
            if (currentChatType === 'group' && !isOwn) {
                const nameSpan = document.createElement('div');
                nameSpan.className = 'sender-name';
                nameSpan.innerText = senderName;
                msgDiv.appendChild(nameSpan);
            }
            if (msg.image) {
                const img = document.createElement('img');
                img.src = msg.image;
                img.className = 'message-image';
                img.addEventListener('click', () => {
                    document.getElementById('fullImage').src = msg.image;
                    document.getElementById('imageModal').classList.add('active');
                });
                msgDiv.appendChild(img);
            }
            if (msg.file) {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'message-file';
                fileDiv.innerHTML = `📎 <span>${msg.file.split('/').pop()}</span>`;
                fileDiv.addEventListener('click', () => {
                    window.open(msg.file, '_blank');
                });
                msgDiv.appendChild(fileDiv);
            }
            if (msg.text) {
                const textNode = document.createTextNode(msg.text);
                msgDiv.appendChild(textNode);
            }
            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            const timeSpan = document.createElement('span');
            timeSpan.className = 'message-time';
            const date = new Date(msg.timestamp);
            timeSpan.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            metaDiv.appendChild(timeSpan);
            if (isOwn && currentChatType === 'private') {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'message-status';
                statusSpan.innerText = msg.read ? '✓✓' : '✓';
                metaDiv.appendChild(statusSpan);
            }
            msgDiv.appendChild(metaDiv);
            wrapper.appendChild(msgDiv);
            if (msg.reactions && msg.reactions.length > 0) {
                const reactionsDiv = document.createElement('div');
                reactionsDiv.className = 'reactions';
                const grouped = {};
                msg.reactions.forEach(r => {
                    if (!grouped[r.emoji]) grouped[r.emoji] = 0;
                    grouped[r.emoji]++;
                });
                Object.entries(grouped).forEach(([emoji, count]) => {
                    const react = document.createElement('span');
                    react.className = 'reaction';
                    react.innerHTML = `${emoji} <span class="reaction-count">${count}</span>`;
                    reactionsDiv.appendChild(react);
                });
                wrapper.appendChild(reactionsDiv);
            }
            return wrapper;
        }

        function attachLongPressToElement(wrapper) {
            wrapper.addEventListener('touchstart', (e) => {
                longPressTimer = setTimeout(() => {
                    const timestamp = wrapper.dataset.timestamp;
                    const msgs = getMessagesForChat(currentChatId);
                    const msg = msgs.find(m => m.timestamp == timestamp);
                    if (msg && msg.senderId !== myId) {
                        currentMessageData = msg;
                        const menu = document.getElementById('reactionMenu');
                        const rect = wrapper.getBoundingClientRect();
                        menu.style.top = rect.top + 'px';
                        menu.style.left = rect.left + 'px';
                        menu.classList.add('active');
                        const downloadBtn = document.getElementById('downloadMediaBtn');
                        if (msg.image || msg.file) {
                            downloadBtn.style.display = 'flex';
                            downloadBtn.onclick = () => {
                                window.open(msg.image || msg.file, '_blank');
                                menu.classList.remove('active');
                            };
                        } else {
                            downloadBtn.style.display = 'none';
                        }
                    }
                }, 500);
            });
            wrapper.addEventListener('touchend', () => {
                clearTimeout(longPressTimer);
            });
            wrapper.addEventListener('touchmove', () => {
                clearTimeout(longPressTimer);
            });
        }

        async function addReaction(chatId, messageTimestamp, emoji) {
            const msg = dbCache.messages.find(m => m.chatId === chatId && m.timestamp === messageTimestamp);
            if (!msg) return;
            if (!msg.reactions) msg.reactions = [];
            const existing = msg.reactions.find(r => r.userId === myId && r.emoji === emoji);
            if (existing) {
                msg.reactions = msg.reactions.filter(r => !(r.userId === myId && r.emoji === emoji));
            } else {
                msg.reactions.push({ userId: myId, emoji });
            }
            await rewriteDatabase();
            updateMessageInDOM(messageTimestamp);
        }

        function updateMessageInDOM(timestamp) {
            const wrapper = document.querySelector(`.message-wrapper[data-timestamp="${timestamp}"]`);
            if (!wrapper) return;
            const msg = dbCache.messages.find(m => m.timestamp == timestamp);
            if (!msg) return;
            const isOwn = msg.senderId === myId;
            const newWrapper = createMessageElement(msg, isOwn);
            wrapper.replaceWith(newWrapper);
            attachLongPressToElement(newWrapper);
        }

        async function addChatFromSearch(searchId) {
            let user = dbCache.users.find(u => u.id === searchId);
            if (user) {
                const chatId = `private_${[myId, user.id].sort().join('_')}`;
                ensureChatExists(chatId, user.name, 'private');
                return { id: chatId, name: user.name, type: 'private' };
            }
            let group = dbCache.groups.find(g => g.id === searchId);
            if (group) {
                ensureChatExists(group.id, group.name, 'group');
                return { id: group.id, name: group.name, type: 'group' };
            }
            return null;
        }

        function renderChatsList() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            if (chats.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align:center; padding:20px;">Нет чатов</div>';
                return;
            }
            const sorted = [...chats].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return 0;
            });
            sorted.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''} ${chat.pinned ? 'pinned' : ''}`;
                div.dataset.id = chat.id;
                div.dataset.type = chat.type;
                div.dataset.name = chat.name;
                let avatarContent = '';
                if (chat.type === 'private') {
                    const otherId = chat.id.split('_')[1] === myId ? chat.id.split('_')[2] : chat.id.split('_')[1];
                    const user = dbCache.users.find(u => u.id === otherId);
                    if (user && user.avatar) {
                        avatarContent = `<img src="${user.avatar}" class="chat-avatar-img">`;
                    } else {
                        avatarContent = '👤';
                    }
                } else {
                    const group = dbCache.groups.find(g => g.id === chat.id);
                    if (group && group.avatar) {
                        avatarContent = `<img src="${group.avatar}" class="chat-avatar-img">`;
                    } else {
                        avatarContent = '👥';
                    }
                }
                div.innerHTML = `
                    <div class="chat-avatar" data-userid="${chat.id}">${avatarContent}</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${chat.name}
                            ${chat.pinned ? '<span class="pin-indicator">📌</span>' : ''}
                        </div>
                        <div class="chat-preview">${chat.lastMessage || '...'}</div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn pin-btn" title="${chat.pinned ? 'Открепить' : 'Закрепить'}">${chat.pinned ? '📍' : '📌'}</button>
                        <button class="chat-action-btn delete-btn" title="Удалить чат">🗑️</button>
                    </div>
                `;
                div.querySelector('.pin-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePinChat(chat.id);
                });
                div.querySelector('.delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                });
                div.querySelector('.chat-avatar').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (chat.type !== 'group') {
                        const otherId = chat.id.split('_')[1] === myId ? chat.id.split('_')[2] : chat.id.split('_')[1];
                        showUserProfile(otherId);
                    } else {
                        showGroupSettings(chat.id);

                });

                    enterChat(chat.id, chat.type, chat.name);
                });
                container.appendChild(div);
            });
        }

            document.body.classList.remove('accent-color-gold', 'accent-color-blue', 'accent-color-green', 'accent-color-red', 'accent-color-purple', 'accent-color-orange');

            document.getElementById('themeSelect').value = theme;
            document.getElementById('ownColorSelect').value = ownColor;
            document.getElementById('otherColorSelect').value = otherColor;
            document.getElementById('accentColorSelect').value = accentColor;
            applyCustomization(theme, ownColor, otherColor, accentColor);
        }

        window.onload = async function () {
            const modalGithub = document.getElementById('githubModal');
            const modalRegister = document.getElementById('registerModal');
            const modalCustomize = document.getElementById('customizeModal');
            const modalCreateGroup = document.getElementById('createGroupModal');
            const modalMembers = document.getElementById('membersModal');
            const modalImage = document.getElementById('imageModal');
            const modalProfile = document.getElementById('profileModal');
            const modalGroupSettings = document.getElementById('groupSettingsModal');
            const hasConfig = loadGitHubConfig();
            loadCustomization();

            document.getElementById('userInfoBlock').addEventListener('click', () => {
                if (myId) {
                    document.getElementById('profileName').value = myName || '';
                    document.getElementById('profileBio').value = myBio || '';
                    document.getElementById('profileId').value = myId || '';
                    updateAvatarPreview();
                    modalCustomize.classList.add('active');
                } else {
                    alert('Сначала войдите в систему');
                }
            });

            document.getElementById('closeCustomizeBtn').onclick = () => {
                modalCustomize.classList.remove('active');
            };

            document.getElementById('copyIdBtn').onclick = () => {
                if (myId) {
                    navigator.clipboard.writeText(myId);
                    alert('ID скопирован');
                }
            };

            document.getElementById('uploadAvatarBtn').onclick = () => {
                document.getElementById('avatarInput').click();
            };

            document.getElementById('avatarInput').onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('Файл слишком большой (макс 5MB)');
                    return;
                }
                const fileName = `avatar_${myId}_${Date.now()}.${file.name.split('.').pop()}`;
                const url = await uploadFileToGitHub(file, fileName);
                if (url) {
                    myAvatar = url;
                    const user = dbCache.users.find(u => u.id === myId);
                    if (user) {
                        user.avatar = url;
                    }
                    const success = await rewriteDatabase();
                    if (success) {
                        localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: myName, email: myEmail, avatar: url, bio: myBio }));
                        updateSidebarUserInfo();
                        updateAvatarPreview();
                        updateChatHeaderAvatar();
                        renderChatsList();
                        alert('Аватар обновлен');
                    }
                } else {
                    alert('Ошибка загрузки');
                }
            };

            document.getElementById('updateNameBtn').onclick = async function () {
                const newName = document.getElementById('profileName').value.trim();
                if (!newName) {
                    alert('Имя не может быть пустым');
                    return;
                }
                if (newName === myName) return;
                const user = dbCache.users.find(u => u.id === myId);
                if (user) user.name = newName;
                const success = await rewriteDatabase();
                if (success) {
                    myName = newName;
                    localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: myName, email: myEmail, avatar: myAvatar, bio: myBio }));
                    const userIndex = users.findIndex(u => u.id === myId);
                    if (userIndex !== -1) users[userIndex].name = newName;
                    localStorage.setItem('halal_users', JSON.stringify(users));
                    updateSidebarUserInfo();
                    alert('Имя обновлено');
                } else {
                    alert('Ошибка при обновлении имени в GitHub');
                }
            };

            document.getElementById('updateBioBtn').onclick = async function () {
                const newBio = document.getElementById('profileBio').value.trim();
                const user = dbCache.users.find(u => u.id === myId);
                if (user) user.bio = newBio;
                const success = await rewriteDatabase();
                if (success) {
                    myBio = newBio;
                    localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: myName, email: myEmail, avatar: myAvatar, bio: myBio }));
                    alert('Описание обновлено');
                } else {
                    alert('Ошибка при обновлении описания');
                }
            };

            document.getElementById('createGroupBtn').onclick = () => {
                if (!myId) {
                    alert('Сначала войдите в систему');
                    return;
                }
                modalCustomize.classList.remove('active');
                modalCreateGroup.classList.add('active');
            };

            document.getElementById('closeGroupModalBtn').onclick = () => {
                modalCreateGroup.classList.remove('active');
            };

            document.getElementById('createGroupConfirmBtn').onclick = async function () {
                const groupName = document.getElementById('groupName').value.trim();
                if (!groupName) {
                    document.getElementById('groupError').innerText = 'Введите название группы';
                    document.getElementById('groupError').style.display = 'block';
                    return;
                }
                const newId = generateGroupId();
                const groupLine = `GROUP|${groupName}||default|${newId}`;
                dbCache.groups.push({ name: groupName, avatar: '', bgColor: 'default', id: newId });
                const ok = await appendToDatabase(groupLine);
                if (ok) {
                    const memberLine = `GROUP_MEMBER|${newId}|${myId}`;
                    dbCache.groupMembers.push({ groupId: newId, userId: myId });
                    await appendToDatabase(memberLine);
                    chats.push({ id: newId, name: groupName, type: 'group', lastMessage: '', pinned: false });
                    saveChatsToStorage();
                    renderChatsList();
                    modalCreateGroup.classList.remove('active');
                    document.getElementById('groupName').value = '';
                    document.getElementById('groupError').style.display = 'none';
                    alert('Группа создана! ID: ' + newId);
                } else {
                    document.getElementById('groupError').innerText = 'Ошибка создания группы';
                    document.getElementById('groupError').style.display = 'block';
                }
            };

            document.getElementById('saveCustomizeBtn').onclick = () => {
                const theme = document.getElementById('themeSelect').value;
                const ownColor = document.getElementById('ownColorSelect').value;
                const otherColor = document.getElementById('otherColorSelect').value;
                const accentColor = document.getElementById('accentColorSelect').value;
                localStorage.setItem('halal_theme', theme);
                localStorage.setItem('halal_own_color', ownColor);
                localStorage.setItem('halal_other_color', otherColor);
                localStorage.setItem('halal_accent_color', accentColor);
                applyCustomization(theme, ownColor, otherColor, accentColor);
                modalCustomize.classList.remove('active');
            };

            document.getElementById('membersBtn').onclick = async function () {
                if (!currentChatId || currentChatType !== 'group') return;
                const members = dbCache.groupMembers.filter(gm => gm.groupId === currentChatId).map(gm => gm.userId);
                const list = document.getElementById('membersList');
                list.innerHTML = '';
                for (const memberId of members) {
                    const user = dbCache.users.find(u => u.id === memberId) || users.find(u => u.id === memberId) || { name: 'Неизвестно', avatar: null };
                    let avatarHtml = '';
                    if (user.avatar) {
                        avatarHtml = `<img src="${user.avatar}" class="avatar-small-img">`;
                    } else {
                        avatarHtml = user.name.charAt(0).toUpperCase();
                    }
                    const li = document.createElement('li');
                    li.innerHTML = `<div class="avatar-small">${avatarHtml}</div> ${user.name} (${memberId})`;
                    list.appendChild(li);
                }
                document.getElementById('membersModalTitle').innerText = `Участники группы ${currentPeerInfo}`;
                modalMembers.classList.add('active');
            };

            document.getElementById('closeMembersBtn').onclick = () => {
                modalMembers.classList.remove('active');
            };

            document.getElementById('closeGroupSettingsBtn').onclick = () => {
                modalGroupSettings.classList.remove('active');
            };

            document.getElementById('uploadGroupAvatarBtn').onclick = () => {
                document.getElementById('groupAvatarInput').click();
            };

            document.getElementById('groupAvatarInput').onchange = async function(e) {
                const file = e.target.files[0];
                if (!file || !modalGroupSettings.dataset.groupId) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('Файл слишком большой (макс 5MB)');
                    return;
                }
                const fileName = `group_avatar_${modalGroupSettings.dataset.groupId}_${Date.now()}.${file.name.split('.').pop()}`;
                const url = await uploadFileToGitHub(file, fileName);
                if (url) {
                    const groupId = modalGroupSettings.dataset.groupId;
                    const group = dbCache.groups.find(g => g.id === groupId);
                    if (group) {
                        group.avatar = url;
                        await rewriteDatabase();
                        document.getElementById('groupAvatarPreviewImg').src = url;
                        document.getElementById('groupAvatarPreviewImg').style.display = 'block';
                        document.getElementById('groupAvatarPreviewText').style.display = 'none';
                        renderChatsList();
                        if (currentChatId === groupId) {
                            const chatAvatar = document.getElementById('chatAvatar');
                            const chatAvatarImg = document.getElementById('chatAvatarImg');
                            chatAvatarImg.src = url;
                            chatAvatarImg.style.display = 'block';
                            chatAvatar.querySelector('span').style.display = 'none';
                        }
                        alert('Аватар группы обновлен');
                    }
                }
            };

            document.getElementById('saveGroupSettingsBtn').onclick = async function() {
                const groupId = modalGroupSettings.dataset.groupId;
                const group = dbCache.groups.find(g => g.id === groupId);
                if (!group) return;
                const bgColor = document.getElementById('groupBgColor').value;
                group.bgColor = bgColor;
                await rewriteDatabase();
                if (currentChatId === groupId) {
                    if (bgColor === 'default') {
                        document.getElementById('messagesContainer').style.backgroundColor = '';
                    } else {
                        document.getElementById('messagesContainer').style.backgroundColor = bgColor;
                    }
                }
                modalGroupSettings.classList.remove('active');
                alert('Настройки группы сохранены');
            };

            document.getElementById('closeProfileBtn').onclick = () => {
                modalProfile.classList.remove('active');
            };

            document.getElementById('closeImageBtn').onclick = () => {
                modalImage.classList.remove('active');
            };

            document.getElementById('attachBtn').onclick = () => {
                document.getElementById('attachMenu').classList.toggle('active');
            };

            document.getElementById('attachPhotoBtn').onclick = () => {
                document.getElementById('fileInput').click();
                document.getElementById('attachMenu').classList.remove('active');
            };

            document.getElementById('attachFileBtn').onclick = () => {
                document.getElementById('anyFileInput').click();
                document.getElementById('attachMenu').classList.remove('active');
            };

            document.getElementById('fileInput').onchange = async function(e) {
                const file = e.target.files[0];
                if (!file || !currentChatId) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('Файл слишком большой (макс 5MB)');
                    return;
                }
                const fileName = `image_${Date.now()}_${file.name}`;
                const url = await uploadFileToGitHub(file, fileName);
                if (url) {
                    await addMessage(currentChatId, myId, '', url, '');
                }
            };

            document.getElementById('anyFileInput').onchange = async function(e) {
                const file = e.target.files[0];
                if (!file || !currentChatId) return;
                if (file.size > 10 * 1024 * 1024) {
                    alert('Файл слишком большой (макс 10MB)');
                    return;
                }
                const fileName = `file_${Date.now()}_${file.name}`;
                const url = await uploadFileToGitHub(file, fileName);
                if (url) {
                    await addMessage(currentChatId, myId, '', '', url);
                }
            };

            document.querySelectorAll('.reaction-menu-item').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const emoji = btn.dataset.reaction;
                    if (currentMessageData) {
                        await addReaction(currentChatId, currentMessageData.timestamp, emoji);
                        document.getElementById('reactionMenu').classList.remove('active');
                    }
                });
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.reaction-menu') && !e.target.closest('.message-wrapper')) {
                    document.getElementById('reactionMenu').classList.remove('active');
                }
            });

            if (!hasConfig) {
                modalGithub.classList.add('active');
            } else {
                if (!loadOwnProfile()) {
                    modalRegister.classList.add('active');
                } else {
                    modalGithub.classList.remove('active');
                    modalRegister.classList.remove('active');
                    updateSidebarUserInfo();
                    await loadDatabase();
                    loadChatsFromStorage();
                    rebuildChatsFromAllData();
                    dbUpdateInterval = setInterval(async () => {
                        await loadDatabase();
                    }, 2000);
                }
            }

            document.getElementById('globalGithubBtn').onclick = () => {
                modalGithub.classList.add('active');
            };
            document.getElementById('closeModalBtn').onclick = () => {
                modalGithub.classList.remove('active');
            };
            document.getElementById('saveGitHubBtn').onclick = async function () {
                if (saveGitHubConfig()) {
                    modalGithub.classList.remove('active');
                    if (!loadOwnProfile()) {
                        modalRegister.classList.add('active');
                    } else {
                        await loadDatabase();
                        if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                        dbUpdateInterval = setInterval(async () => {
                            await loadDatabase();
                        }, 2000);
                    }
                }
            };

            document.getElementById('tabRegister').onclick = () => {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('registerBlock').style.display = 'block';
                document.getElementById('loginBlock').style.display = 'none';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
            };
            document.getElementById('tabLogin').onclick = () => {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
                document.getElementById('registerBlock').style.display = 'none';
                document.getElementById('loginBlock').style.display = 'block';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
            };

            document.getElementById('registerBtn').onclick = async function () {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                if (!name || !email || !password) {
                    document.getElementById('authError').innerText = '❌ Заполните все поля';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                const existing = users.find(u => u.email === email) || dbCache.users.find(u => u.email === email);
                if (existing) {
                    document.getElementById('authError').innerText = '❌ Пользователь с таким email уже существует';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                const newId = generatePersonId();
                users.push({ name, email, password, id: newId });
                localStorage.setItem('halal_users', JSON.stringify(users));
                myId = newId;
                myName = name;
                myEmail = email;
                myBio = '';
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name, email, bio: '' }));
                const userLine = `USER|${name}|${email}|${password}|||${newId}`;
                dbCache.users.push({ name, email, password, avatar: '', bio: '', id: newId });
                await appendToDatabase(userLine);
                modalRegister.classList.remove('active');
                updateSidebarUserInfo();
                loadChatsFromStorage();
                if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                dbUpdateInterval = setInterval(async () => {
                    await loadDatabase();
                }, 2000);
            };

            document.getElementById('loginBtn').onclick = async function () {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                let user = users.find(u => u.email === email && u.password === password);
                if (!user) {
                    const dbUser = dbCache.users.find(u => u.email === email && u.password === password);
                    if (dbUser) {
                        user = { name: dbUser.name, email: dbUser.email, password: dbUser.password, id: dbUser.id, avatar: dbUser.avatar, bio: dbUser.bio };
                        if (!users.find(u => u.id === dbUser.id)) {
                            users.push(user);
                            localStorage.setItem('halal_users', JSON.stringify(users));
                        }
                    }
                }
                if (!user) {
                    document.getElementById('authError').innerText = '❌ Неверный email или пароль';
                    document.getElementById('authError').style.display = 'block';
                    return;
                }
                myId = user.id;
                myName = user.name;
                myEmail = user.email;
                myAvatar = user.avatar || null;
                myBio = user.bio || '';
                localStorage.setItem('halal_my_profile', JSON.stringify({ id: myId, name: myName, email: myEmail, avatar: myAvatar, bio: myBio }));
                modalRegister.classList.remove('active');
                updateSidebarUserInfo();
                await loadDatabase();
                loadChatsFromStorage();
                rebuildChatsFromAllData();
                if (dbUpdateInterval) clearInterval(dbUpdateInterval);
                dbUpdateInterval = setInterval(async () => {
                    await loadDatabase();
                }, 2000);
            };

            document.getElementById('searchIdInput').addEventListener('keypress', async function (e) {
                if (e.key === 'Enter') {
                    const searchId = this.value.trim();
                    if (!searchId) return;
                    const chatInfo = await addChatFromSearch(searchId);
                    if (chatInfo) {
                        enterChat(chatInfo.id, chatInfo.type, chatInfo.name);
                    } else {
                        alert('ID не найден');
                    }
                    this.value = '';
                }
            });

            document.getElementById('sendMsgBtn').onclick = async function () {
                const msg = document.getElementById('messageInput').value.trim();
                if (!msg && !document.getElementById('fileInput').files.length && !document.getElementById('anyFileInput').files.length) {
                    return;
                }
                if (!currentChatId) {
                    alert('Нет активного чата');
                    return;
                }
                if (msg) {
                    await addMessage(currentChatId, myId, msg, '', '');
                }
                document.getElementById('messageInput').value = '';
            };

            document.getElementById('messageInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    document.getElementById('sendMsgBtn').click(); 
                }
            });

            document.getElementById('backToChatsBtn').onclick = () => {
                showSidebar();
            };
        };
    </script>
</body>
</html>
